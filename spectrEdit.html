async function rtWasmHost(canal, buffer) {
	pushUndoState(gainBuffers);

	// buffer = rendu WAM2 (offline) — normaliser en Float32Array
	// (IPC peut livrer Float32Array ou ArrayBuffer selon la version d'Electron)
	let f32 = null;
	if (buffer instanceof Float32Array) {
		f32 = buffer;
	} else if (buffer instanceof ArrayBuffer) {
		f32 = new Float32Array(buffer);
	} else if (buffer && typeof buffer.length === 'number' && buffer.length > 0) {
		f32 = new Float32Array(buffer);
	}
	if (f32 && f32.length > 0) {
		gainBuffers = gainBuffers.map(() => new Float32Array(f32));
	}

	objSelect.tableFx = ["0","0","0","0","0","0","0"];
	objSelect.tableFxParam = [];
	// Synchroniser currentChannels depuis gainBuffers sans round-trip WAV
	currentChannels = gainBuffers.map(c => new Float32Array(c));
	numSamples = gainBuffers[0].length;
	Duree = numSamples / sampleRate;

	var outPath = window.api.joinPath(`${baseDatatPath}`, "renduout.wav");
	await window.api.saveAudioBuffer({ filePath: outPath, buffer: { sampleRate, channels: gainBuffers } });

	// Notifier WAM2 de recharger son lecteur
	window.api.send("toMain", `reloadWamPlayer;${outPath}`);

	// Synchroniser renduplay.wav — le player doit correspondre au spectro
	const playPath = window.api.joinPath(`${baseDatatPath}`, "renduplay.wav");
	await window.api.saveAudioBuffer({ filePath: playPath, buffer: { sampleRate, channels: gainBuffers } });
	if (isPlaying) {
		await window.api.killAudio();
		isPlaying = false;
	}

	numSamples = gainBuffers[0].length;
	Duree = numSamples / sampleRate;
	updateSpectro();
	drawWaveform();
}
async function wasm() {

function pushUndoState(channels) {

    const copy = channels.map(ch => new Float32Array(ch));

    undoStack.push({
        channels: copy,
        sampleRate
    });

    // dès qu'on modifie → redo devient invalide
    redoStack.length = 0;
}
async function undo(){

    if (undoStack.length === 0) return;

    const state = undoStack.pop();

    redoStack.push({
        channels: gainBuffers.map(ch => new Float32Array(ch)),
        sampleRate
    });

    gainBuffers = state.channels;
    numSamples = gainBuffers[0].length;
    Duree = numSamples / sampleRate;

    const outPath = window.api.joinPath(`${baseDatatPath}`, "renduout.wav");
    await window.api.saveAudioBuffer({ filePath: outPath, buffer: { sampleRate, channels: gainBuffers } });
    const playPath = window.api.joinPath(`${baseDatatPath}`, "renduplay.wav");
    await window.api.saveAudioBuffer({ filePath: playPath, buffer: { sampleRate, channels: gainBuffers } });

    updateSpectro();
}
async function redo(){

    if (redoStack.length === 0) return;

    const state = redoStack.pop();

    undoStack.push({
        channels: gainBuffers.map(ch => new Float32Array(ch)),
        sampleRate
    });

    gainBuffers = state.channels;
    numSamples = gainBuffers[0].length;
    Duree = numSamples / sampleRate;

    await window.api.saveAudioBuffer({ filePath: playPath, buffer: { sampleRate, channels: gainBuffers } });

    updateSpectro();
}

let _volRestartTimer = null;

async function restartWithVol() {
	_volRestartTimer = null;
	if (!isPlaying) return;
	const trimStart = Math.max(0, playheadSample / sampleRate);
	const volParam = getVolParam();
	await window.api.killAudio();
	playStartTime = performance.now() - trimStart * 1000;
	const soxParams = `${volParam} trim ${trimStart.toFixed(4)} 0`;
	await window.api.playFromBuffer({ sampleRate, channels: gainBuffers, soxParams });
}
function getVolParam() {
	const dB = parseFloat(document.getElementById("tgain").value) || 0;
	const linear = Math.pow(10, dB / 20);
	return `vol ${linear.toFixed(4)}`;
}

async function applyGain() {
    await defGain();
    updateSpectro();
    wamBuffers=gainBuffers.map(c => new Float32Array(c));
	 fxBuffers=gainBuffers.map(c => new Float32Array(c));

async function defGain(){
    const gainDb = parseFloat(document.getElementById("tgain").value);
    const gain = Math.pow(10, gainDb / 20);
	 gainBuffers=gainBuffers.map(c => new Float32Array(c));
    for (let ch = 0; ch < gainBuffers.length; ch++) {
        const buf = gainBuffers[ch];
        for (let i = 0; i < buf.length; i++) {
            buf[i] *= gain;
        }
    }
    var outPath = window.api.joinPath(`${baseDatatPath}`,"renduout.wav");
    await window.api.saveAudioBuffer({
        filePath: outPath,
        buffer: { sampleRate, channels: gainBuffers }
    });
    const playPath = window.api.joinPath(`${baseDatatPath}`, "renduplay.wav");
    await window.api.saveAudioBuffer({ filePath: playPath, buffer: { sampleRate, channels: gainBuffers } });
}

let playheadSample = 0;
function drawPlayhead() {

    const canvas = document.getElementById("waveForm");
    const ctx = canvas.getContext("2d");

    const offsetX = 60;
    const width = canvas.width;
    const height = canvas.height;

    if (!gainBuffers) return;

    const totalSamples = gainBuffers[0].length;

    const x = offsetX + (playheadSample / totalSamples) * (width - offsetX);

    ctx.strokeStyle = "red";
    ctx.lineWidth = 1;

    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, height);
    ctx.stroke();
}	
function updatePlayhead() {
	 const totalSamples = gainBuffers[0].length;
    if (!isPlaying) return;

    const elapsed = (performance.now() - playStartTime) / 1000;

    playheadSample = Math.floor(elapsed * sampleRate);
    drawWaveform();
	 if (playheadSample > totalSamples) {
	    playheadSample = totalSamples;
	    isPlaying = false;
	}
    requestAnimationFrame(updatePlayhead);
}
let screenLog = document.getElementById('screen-log');
function yToFrequency1(y) {
    const normY = y / spectroH;
    const logMax = Math.log10(sampleRate / 2);
    const logMin = Math.log10(20);
    const logFreq = logMax - normY * (logMax - logMin);
    let freq=Math.pow(10, logFreq);
    if(freq<20){
    	freq=20;
    }
    return freq
}
function yToFrequency(y) {

    // position réelle dans le spectrogramme
    const yTotal = (y + scrollDemo.scrollTop) / zoomScale;

    const logMin = Math.log10(20);
    const logMax = Math.log10(sampleRate / 2);

    const ratio = yTotal / spectroH;

    const logF = logMax - ratio * (logMax - logMin);

    return Math.pow(10, logF);
}
function xToTime(x) {
    const drawW = spectroW - MARGIN_LEFT;
    const ratioT = Duree / drawW;
    const marginDisplay = MARGIN_LEFT * zoomScale;
    var posX = (x - (spectroOffsetLeft + MARGIN_LEFT) + scrollDemo.scrollLeft - (marginDisplay - MARGIN_LEFT)) / zoomScale;
    if(posX < 0) posX = 0;
    if(posX > drawW * zoomScale) posX = drawW * zoomScale;
    return posX * ratioT;
}

function timeToX(time) {
    const drawW = spectroW - MARGIN_LEFT;
    const ratioT = Duree / drawW;
    const marginDisplay = MARGIN_LEFT * zoomScale;

    var posX = time / ratioT;

    if (posX < 0) posX = 0;
    if (posX > drawW) posX = drawW;

    return posX * zoomScale
         + (spectroOffsetLeft + MARGIN_LEFT)
         - scrollDemo.scrollLeft
         + (marginDisplay - MARGIN_LEFT);
}
const logMin = Math.log10(20);
const logMax = Math.log10(sampleRate/2);

function freqToY(freq) {
    const ratio = (Math.log10(sampleRate/2) - Math.log10(freq)) / (Math.log10(sampleRate/2) - Math.log10(20));
    return ratio * spectroH * zoomScale;
}
function updateSelection(e) {
    const sel = document.getElementById("selector");
    const left   = (sel.offsetLeft*zoomScale) + spectroOffsetLeft + scrollDemo.scrollLeft;
    const top    = (sel.offsetTop*zoomScale)+ scrollDemo.scrollTop;
    const width  = sel.offsetWidth*zoomScale;

function drawWaveform() {

    const canvas = document.getElementById("waveForm");
    const ctx = canvas.getContext("2d");

    const width = canvas.width;
    const height = canvas.height;

    const offsetX = 60; // décalage à gauche

    ctx.clearRect(0, 0, width, height);

    if (!gainBuffers || gainBuffers.length === 0) return;

    const channel = gainBuffers[0];

    const drawWidth = width - offsetX;
    const samplesPerPixel = channel.length / drawWidth;

    ctx.beginPath();
    ctx.strokeStyle = "#fa1b30";
    ctx.lineWidth = 1;

    for (let x = 0; x < drawWidth; x++) {

        const start = Math.floor(x * samplesPerPixel);
        const end   = Math.min(Math.ceil((x + 1) * samplesPerPixel), channel.length);

        let min =  Infinity;
        let max = -Infinity;

        for (let i = start; i < end; i++) {
            const val = channel[i];
            if (val < min) min = val;
            if (val > max) max = val;
        }

        if (min === Infinity) { min = 0; max = 0; }

        const y1 = (1 - max) * height * 0.5;
        const y2 = (1 - min) * height * 0.5;

        ctx.moveTo(x + offsetX, y1);
        ctx.lineTo(x + offsetX, y2);
    }

    ctx.stroke();
    
    drawPlayhead();
}

function mixToMono(channels) {
    if (channels.length === 0) return null;

    const length = channels[0].length;
    const out = new Float32Array(length);

    for (let i = 0; i < length; i++) {
        let sum = 0;

        for (let c = 0; c < channels.length; c++) {
            sum += channels[c][i];
        }

        out[i] = sum / channels.length; // moyenne → évite clipping
    }

    return out;
}
function copySegment(channels, startSec, endSec) {

    const startSample = Math.floor(startSec * sampleRate);
    const endSample   = Math.floor(endSec * sampleRate);

    const length = endSample - startSample;
    if (length <= 0) throw new Error("Invalid time range");

    return channels.map(channel => {
        const src = new Float32Array(channel); // conversion si Float64
        return src.slice(startSample, endSample);
    });
}

async function applyFxBuffers(obj,numChannels,buffers,numSamples,sampleRate) {
	
    // ----- WAM / GREFFONS -----
    const fxSlots = obj.tableFx || [];
    const validSlots = fxSlots.filter(k => k && listeFx && listeFx[k]);
    const blockSize = 1024;
    let current = buffers.map(c => new Float32Array(c));
	 const processedChannels = new Array(numChannels);
    // Import faustwasm once
    const appPaths = await window.api.getPaths();
    const faust=window.api.joinPath(window.api.resources,"@grame","faustwasm","dist","esm","index.js");
    const faustPkg = await import(`file://${faust}`);
    const { instantiateFaustModuleFromFile, LibFaust, FaustCompiler, FaustMonoDspGenerator } = faustPkg;
    const faustModule = await instantiateFaustModuleFromFile(`${appPaths.basedir}/resources/@grame/faustwasm/libfaust-wasm/libfaust-wasm.js`);
    const libFaust = new LibFaust(faustModule);
    const compiler = new FaustCompiler(libFaust);

    for (let slotIndex = 0; slotIndex < validSlots.length; slotIndex++) {
        const fxKey = validSlots[slotIndex];
        const fxDesc = listeFx[fxKey];
        const dspName = fxDesc.greffon;
        let processor = null;
        let paramsPaths = [];

        try {
            const generator = new FaustMonoDspGenerator();
            let dspSource = await window.api.readFxFile(`./greffons/${dspName}-wasm/${dspName}.dsp`);
            if (dspSource instanceof Uint8Array || dspSource instanceof ArrayBuffer) {
                dspSource = new TextDecoder().decode(dspSource);
            }

            await generator.compile(compiler, dspName, dspSource, "");
            processor = await generator.createOfflineProcessor(sampleRate, blockSize);
            
            // récupère les paramètres WAM
            const paramDest = processor.getParams();
            if (paramDest && paramDest.length > 0) {
                paramsPaths = paramDest.map(p => p.path || p);
                const bypassPath = paramsPaths.find(p => p.toLowerCase().includes("bypass"));
					if (bypassPath) {
					    try { processor.setParamValue(bypassPath, 0); } catch(e){}
					}
            }
        } catch (err) {
            console.warn(`[pipeline] DSP compilation failed for slot ${slotIndex} → passthrough`, err);
            processor = null;
        }

        // ----- Parse automation -----
        const tableFxParam = obj.tableFxParam || [];
        const fxParamString = tableFxParam[slotIndex] || "";
        const paramBlocks = fxParamString.split("/").map(blockStr => {
            if (!blockStr) return [];
            return blockStr.split("&").map(seg => {
                const [t, v] = seg.split("?");
                return { time: parseFloat(t||0), value: parseFloat(v||0) };
            }).sort((a,b)=>a.time-b.time);
        });

        // ----- Traitement multi-canaux -----
        

        for (let ch = 0; ch < numChannels; ch++) {
           const inBuf = current[ch];
            const outBuf = new Float32Array(numSamples);

            for (let offset = 0; offset < numSamples; offset += blockSize) {
                const len = Math.min(blockSize, numSamples - offset);
                const t0 = offset / sampleRate;
                
                // --- Automation WAM ---
                for (let pIndex = 0; pIndex < paramsPaths.length; pIndex++) {
                    const path = paramsPaths[pIndex];
                    const events = paramBlocks[pIndex] || [];
                    if (!events.length) continue;

                    let val = events[0].value;
                    if (t0 <= events[0].time) val = events[0].value;
                    else if (t0 >= events[events.length-1].time) val = events[events.length-1].value;
                    else {
                        for (let i = 0; i < events.length-1; i++) {
                            const a = events[i], b = events[i+1];
                            if (t0 >= a.time && t0 < b.time) {
                                const frac = (t0 - a.time)/(b.time - a.time);
                                val = a.value + frac*(b.value - a.value);
                                break;
                            }
                        }
                    }
                    try { processor.setParamValue(path, val); } catch(e){}
                }

                // --- Process block ---
                const sliceIn = inBuf.subarray(offset, offset+len);
                let blockOut = sliceIn;
                if (processor) {
					    if (!validSlots[slotIndex].bypass) {   // ← ICI
				            const tmp = processor.render([sliceIn], len);
				            blockOut = tmp[0];
				        } else {
				            blockOut = sliceIn;  // bypass logiciel
				        }
    
    
						}

                outBuf.set(blockOut, offset);
            }
            

            processedChannels[ch] = outBuf;
        }
        
        // mise à jour pour le slot suivant
       current = processedChannels.map(c => new Float32Array(c));
    }
    
    return current;
}

function convertFrames(frames, fftSize) {

    const bins = fftSize / 2;
    const out = [];

    for (let f of frames) {

        const spectrum = f.spectrum;
        const mags = new Float32Array(bins);

        for (let i = 0; i < bins; i++) {
            const re = spectrum[2*i];
            const im = spectrum[2*i + 1];
            mags[i] = Math.sqrt(re*re + im*im);
        }

        out.push(mags);
    }

    return out;
}

function drawSpectrogram(ctx,frames) {
canvas.style.width = "1000px";
canvas.style.height = "600px";
    const width = frames.length;
    const height = frames[0].length;

    canvas.width = width;
    canvas.height = height;

    const imageData = ctx.createImageData(width, height);
    const data = imageData.data;

    const minDb = -100;
    const maxDb = 0;

    for (let x = 0; x < width; x++) {

        const frame = frames[x];

        for (let y = 0; y < height; y++) {

            const mag = frame[y];

            // conversion en dB
            const db = 20 * Math.log10(mag + 1e-12);

            // normalisation 0..1
            const norm = (db - minDb) / (maxDb - minDb);
            const v = Math.max(0, Math.min(1, norm));

            const color = colormap(v);

            // inversion verticale (grave en bas)
            const index = ((height - y - 1) * width + x) * 4;

            data[index]     = color.r;
            data[index + 1] = color.g;
            data[index + 2] = color.b;
            data[index + 3] = 255;
        }
    }

    ctx.putImageData(imageData, 0, 0);
}
function colormap(v) {
    const r = Math.min(255, v * 512);
    const g = Math.min(255, Math.max(0, (v - 0.5) * 512));
    const b = Math.min(255, (1 - v) * 300);
    return { r, g, b };
}

function soxColor(v) {

    v = Math.max(0, Math.min(1, v));

    let r=0,g=0,b=0;

    if (v < 0.25) {
        b = 255 * (v / 0.25);
    }
    else if (v < 0.5) {
        g = 255 * ((v - 0.25) / 0.25);
        b = 255;
    }
    else if (v < 0.75) {
        r = 255 * ((v - 0.5) / 0.25);
        g = 255;
        b = 255 - 255 * ((v - 0.5) / 0.25);
    }
    else {
        r = 255;
        g = 255;
        b = 255 * ((v - 0.75) / 0.25);
    }

    return {r,g,b};
}
function drawSoxStyle(ctx,frames, sampleRate, fftSize) {

    const width = frames.length;
    const height = 700; // hauteur fixe pour interpolation

    canvas.width = width;
    canvas.height = height;

    const imageData = ctx.createImageData(width, height);
    const data = imageData.data;

    const minDb = -120;
    const maxDb = 0;

    const minFreq = 20;
    const maxFreq = sampleRate / 2;

    const logMin = Math.log10(minFreq);
    const logMax = Math.log10(maxFreq);

    for (let x = 0; x < width; x++) {

        const frame = frames[x];

        for (let y = 0; y < height; y++) {

            const normY = 1 - y / height;
            const logFreq = logMin + normY * (logMax - logMin);
            const freq = Math.pow(10, logFreq);

            const bin = Math.floor(freq * fftSize / sampleRate);

            if (bin < 0 || bin >= frame.length) continue;

            const mag = frame[bin];
            const db = 20 * Math.log10(mag + 1e-15);

            const norm = (db - minDb) / (maxDb - minDb);
            const v = Math.max(0, Math.min(1, norm));

            const color = soxColor(v);

            const index = (y * width + x) * 4;

            data[index] = color.r;
            data[index+1] = color.g;
            data[index+2] = color.b;
            data[index+3] = 255;
        }
    }

    ctx.putImageData(imageData, 0, 0);
}
function magToDb(mag) {
    const eps = 1e-15;
    return 20 * Math.log10(mag + eps);
}
function drawScientificSpectrogram(ctx,frames, sampleRate, fftSize) {

    const width = frames.length;
    const height = fftSize / 2;

    canvas.width = width;
    canvas.height = height;

    const imageData = ctx.createImageData(width, height);
    const data = imageData.data;

    const minDb = -100;
    const maxDb = 0;

    for (let x = 0; x < width; x++) {

        const frame = frames[x];

        for (let bin = 0; bin < height; bin++) {

            const mag = frame[bin];
            const db = magToDb(mag);

            const norm = (db - minDb) / (maxDb - minDb);
            const v = Math.max(0, Math.min(1, norm));

            // grayscale scientifique
            const intensity = Math.floor(v * 255);

            const y = height - bin - 1;
            const index = (y * width + x) * 4;

            data[index] = intensity;
            data[index+1] = intensity;
            data[index+2] = intensity;
            data[index+3] = 255;
        }
    }

    ctx.putImageData(imageData, 0, 0);
}
function soxColormap(v) {
    // Dégradé SoX, blanc très limité
    const stops = [
        {p:0.00, c:[0,0,50]},       // bleu profond
        {p:0.15, c:[20,0,60]},
        {p:0.30, c:[60,0,120]},
        {p:0.45, c:[120,0,200]},
        {p:0.60, c:[200,0,120]},
        {p:0.75, c:[255,0,0]},
        {p:0.90, c:[255,180,0]},
        {p:0.995, c:[255,255,255]},  // blanc quasi seulement aux pics extrêmes
        {p:1.00, c:[255,255,255]}
    ];

    for (let i = 0; i < stops.length - 1; i++) {
        const s0 = stops[i];
        const s1 = stops[i + 1];
        if (v >= s0.p && v <= s1.p) {
            const t = (v - s0.p) / (s1.p - s0.p);
            return {
                r: s0.c[0] + (s1.c[0] - s0.c[0]) * t,
                g: s0.c[1] + (s1.c[1] - s0.c[1]) * t,
                b: s0.c[2] + (s1.c[2] - s0.c[2]) * t
            };
        }
    }
    return {r:0, g:0, b:50};
}

function drawSoxClone(ctx, frames, sampleRate, fftSize) {
    const width = spectroW;
    const height = spectroH;
    const marginLeft = MARGIN_LEFT; // espace pour les labels

    canvas.width = width;
    canvas.height = height;

    // Fond bleu profond
    ctx.fillStyle = 'rgb(0,0,50)';
    ctx.fillRect(0, 0, width, height);

    const imageData = ctx.createImageData(width - marginLeft, height);
    const data = imageData.data;

    const minDb = -120;
    const maxDb = -50;
    const minFreq = 20;
    const maxFreq = sampleRate / 2;
    const logMin = Math.log10(minFreq);
    const logMax = Math.log10(maxFreq);

    // Dessiner le spectrogramme
    for (let x = 0; x < width - marginLeft; x++) {
        const frameIndex = Math.floor(x * frames.length / (width - marginLeft));
        const spectrum = frames[frameIndex];
        if (!spectrum) continue;

        for (let y = 0; y < height; y++) {
            const normY = y / height; // basses en bas
            const logFreq = logMax - normY * (logMax - logMin);
            const freq = Math.pow(10, logFreq);

            const binFloat = freq * fftSize / sampleRate;
            const k0 = Math.floor(binFloat);
            const k1 = Math.min(k0 + 1, spectrum.length - 1);
            const t = binFloat - k0;

            if (k0 < 0 || k1 >= spectrum.length) continue;

            let mag = spectrum[k0] * (1 - t) + spectrum[k1] * t;
            mag /= fftSize;
            mag *= 2; // Hann approx

            let db = 20 * Math.log10(mag + 1e-15);
            let norm = (db - minDb) / (maxDb - minDb);
				norm = Math.max(0, Math.min(1, norm));
				
				// contraste plus doux
				norm = Math.pow(norm, 0.8);
				
				// assombrissement global
				norm *= 0.90;

            const color = soxColormap(norm);
            const index = (y * (width - marginLeft) + x) * 4;
            data[index]     = color.r;
            data[index + 1] = color.g;
            data[index + 2] = color.b;
            data[index + 3] = 255;
        }
    }

    // Placer le spectrogramme avec marge
    ctx.putImageData(imageData, marginLeft, 0);

    // Dessiner les labels de fréquence correctement alignés
    ctx.fillStyle = 'white';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';

    const freqsToLabel = [20, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000];
    freqsToLabel.forEach(f => {
        if (f < minFreq || f > maxFreq) return;
        const logF = Math.log10(f);
        const y = height * (logMax - logF) / (logMax - logMin); // ✅ 20 Hz en bas, 20000 Hz en haut
        ctx.fillText(`${f} Hz`, marginLeft - 5, y);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.beginPath();
        ctx.moveTo(marginLeft, y);
        ctx.lineTo(width, y);
        ctx.stroke();
    });
}

    if (startSample >= totalLength) return;

    const fTarget = mouseY;

    // 1️⃣ Extraction
    const selection = gainBuffers.map(ch =>
        new Float32Array(
            ch.subarray(0, Math.min(selectionLength, ch.length))
        )
    );

    // 2️⃣ Bandpass
    const objBandpass = {
        tableFx: ["bandpass"],
        tableFxParam: [`0.00?${objSelect.Fl}/0.00?${objSelect.Fh}`]
    };

    const bandpassBuffers = await applyFxBuffers(
        objBandpass,
        numChannels,
        selection,
        selection[0].length,
        sampleRate
    );

    // 3️⃣ Spectral shift
    const shiftedBuffers = await window.api.spectralShift(
        bandpassBuffers,
        sampleRate,
        0,
        bandpassBuffers[0].length,
        fTarget,
        objSelect
    );

    // 4️⃣ Copie
    const outChannels = currentChannels.map(ch => new Float32Array(ch));

    for (let ch = 0; ch < numChannels; ch++) {

        const insertLength = Math.min(
            shiftedBuffers[ch].length,
            totalLength - startSample
        );

        if (insertLength <= 0) continue;

        // 👉 fade court uniquement sur la zone injectée
        const fadeSamples = Math.min(256, Math.floor(insertLength / 4));

        for (let i = 0; i < insertLength; i++) {

            let gain = 1;

            // fade-in
            if (i < fadeSamples) {
                gain = i / fadeSamples;
            }
            // fade-out
            else if (i > insertLength - fadeSamples) {
                gain = (insertLength - i) / fadeSamples;
            }

            outChannels[ch][startSample + i] += shiftedBuffers[ch][i] * gain;
        }
    }

    return outChannels;
}

function cutSelection(t0, t1) {
	const startSample = Math.max(0, Math.floor(t0 * sampleRate));
	const endSample = Math.floor(t1 * sampleRate);
	const insertLength = endSample-startSample;

	if (endSample <= startSample) return gainBuffers;

  for (let ch = 0; ch < gainBuffers.length; ch++) {
    const data = gainBuffers[ch];
    const length = data.length;

    const safeStart = Math.min(startSample, length);
    const safeEnd   = Math.min(endSample, length);
    const cutLength = safeEnd - safeStart;

    if (cutLength <= 0) continue;

    const newLength = length - cutLength;
    const newData = new Float32Array(newLength);

    // Partie avant sélection
    newData.set(data.subarray(0, safeStart), 0);

    // Partie après sélection
    newData.set(
      data.subarray(safeEnd),
      safeStart
    );

    gainBuffers[ch] = newData;
  }
 
  numSamples =  gainBuffers[0].length;
  Duree=numSamples/sampleRate;
}
async function pasteSelection() {
  pushUndoState(gainBuffers);

  if (!gainBuffers || !gainBuffers.length || !selectBuffers) return;

  const pasteSample = Math.max(0, Math.floor(mouseX * sampleRate));
  const numChannels = gainBuffers.length;

  const FADE = 128; // ~3 ms à 44.1kHz

  for (let ch = 0; ch < numChannels; ch++) {

    const dest = gainBuffers[ch];
    const src  = selectBuffers[Math.min(ch, selectBuffers.length - 1)];

    const destLen = dest.length;
    const srcLen  = src.length;

    const safePaste = Math.min(pasteSample, destLen);

    const newLen = destLen + srcLen;
    const newData = new Float32Array(newLen);

    // ---- partie avant insertion
    newData.set(dest.subarray(0, safePaste), 0);

    // ---- insertion
    newData.set(src, safePaste);

    // ---- partie après
    newData.set(dest.subarray(safePaste), safePaste + srcLen);

    // ==========================
    // CROSSFADE ANTI-CLIC
    // ==========================

    const fade = Math.min(FADE, srcLen, safePaste);

    // crossfade début
    for (let i = 0; i < fade; i++) {

      const t = i / fade;

      const destSample = dest[safePaste - fade + i];
      const srcSample  = src[i];

      newData[safePaste - fade + i] =
          destSample * (1 - t) +
          srcSample * t;
    }

    // crossfade fin
    const tailFade = Math.min(FADE, srcLen, destLen - safePaste);

    for (let i = 0; i < tailFade; i++) {

      const t = i / tailFade;

      const srcSample  = src[srcLen - tailFade + i];
      const destSample = dest[safePaste + i];

      newData[safePaste + srcLen - tailFade + i] =
          srcSample * (1 - t) +
          destSample * t;
    }

    gainBuffers[ch] = newData;
  }

  numSamples = gainBuffers[0].length;
  Duree = numSamples / sampleRate;

  updateSpectro();

  const outPath = window.api.joinPath(`${baseDatatPath}`, "renduout.wav");

  await window.api.saveAudioBuffer({
    filePath: outPath,
    buffer: { sampleRate, channels: gainBuffers }
  });
}

function computeSlidingRMS(buffer, windowSize) {

    const half = Math.floor(windowSize / 2);
    const rms = new Float32Array(buffer.length);

    let sum = 0;

    // première fenêtre
    for (let i = 0; i < windowSize && i < buffer.length; i++) {
        sum += buffer[i] * buffer[i];
    }

    for (let i = 0; i < buffer.length; i++) {

        rms[i] = Math.sqrt(sum / windowSize);

        const remove = i - half;
        const add = i + half + 1;

        if (remove >= 0)
            sum -= buffer[remove] * buffer[remove];

        if (add < buffer.length)
            sum += buffer[add] * buffer[add];
    }

    return rms;
}
function findZeroCrossing(buffer, index, direction = 1, maxOffset = 64) {
    // direction = 1 : vers la droite, -1 : vers la gauche
    let i = index;
    const len = buffer.length;
    let lastSign = Math.sign(buffer[i]);

    for (let offset = 0; offset < maxOffset; offset++) {
        i += direction;
        if (i <= 0 || i >= len - 1) break;
        const sign = Math.sign(buffer[i]);
        if (sign !== lastSign && sign !== 0) return i; // zéro crossing trouvé
        lastSign = sign;
    }
    return index; // pas trouvé, on reste sur l’index original
}
function smoothVolumeLog(buffer, startSample, endSample, windowSize = 128, fadeSamples = 64, zcOffset = 64) {
    const out = new Float32Array(buffer);
    const eps = 1e-12;

    // 1️⃣ trouver zéro crossing proche
    const startZC = findZeroCrossing(buffer, startSample, -1, zcOffset);
    const endZC = findZeroCrossing(buffer, endSample, 1, zcOffset);

    // 2️⃣ RMS glissant
    const rms = computeSlidingRMS(buffer, windowSize);

    const startAmp = Math.max(rms[startZC], eps);
    const endAmp = Math.max(rms[endZC], eps);

    const startDB = 20 * Math.log10(startAmp);
    const endDB = 20 * Math.log10(endAmp);

    const length = endZC - startZC;

    // 3️⃣ lissage principal
    for (let i = 0; i <= length; i++) {
        const idx = startZC + i;
        const t = i / length;
        const targetDB = startDB + t * (endDB - startDB);
        const targetAmp = Math.pow(10, targetDB / 20);
        const currentAmp = Math.max(rms[idx], eps);
        const gain = targetAmp / currentAmp;
        out[idx] = buffer[idx] * gain;
    }

    // 4️⃣ Crossfade début
    const fadeStartIn = Math.max(startZC - fadeSamples, 0);
    for (let i = fadeStartIn; i < startZC; i++) {
        const t = (i - fadeStartIn) / (startZC - fadeStartIn);
        out[i] = buffer[i] * (1 - t) + out[i] * t;
    }

    // 5️⃣ Crossfade fin
    const fadeEndOut = Math.min(endZC + fadeSamples, buffer.length - 1);
    for (let i = endZC + 1; i <= fadeEndOut; i++) {
        const t = (i - endZC) / (fadeEndOut - endZC);
        out[i] = out[i] * (1 - t) + buffer[i] * t;
    }

    return out;
}
