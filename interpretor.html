<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';"/>
  <meta http-equiv="content-style-type" content="text/css"/>
  <link rel="stylesheet" type="text/css" media="all" href="score.css" />
  <title>Interpretor</title>
  <style>
    /* ── Menu bar principal ── */
    #owMenuBar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 26px;
      background-color: #313237;
      z-index: 200;
      display: flex;
      align-items: stretch;
      user-select: none;
    }
    .mnu-item {
      position: relative;
      padding: 0 14px;
      color: #e8e8e8;
      cursor: pointer;
      font-size: 0.82em;
      display: flex;
      align-items: center;
    }
    .mnu-item:hover, .mnu-item.open {
      background-color: #4a4f5c;
    }
    .mnu-drop {
      display: none;
      position: absolute;
      top: 26px; left: 0;
      background-color: #2a2d35;
      border: 1px solid #555;
      min-width: 210px;
      z-index: 300;
      list-style: none;
      margin: 0; padding: 4px 0;
      box-shadow: 2px 4px 10px rgba(0,0,0,0.4);
    }
    .mnu-item.open > .mnu-drop { display: block; }
    .mnu-drop li {
      padding: 5px 18px;
      color: #e8e8e8;
      cursor: pointer;
      font-size: 0.82em;
      white-space: nowrap;
    }
    .mnu-drop li:hover { background-color: #373f8a; }
    .mnu-drop li.sep {
      height: 1px;
      background-color: #555;
      padding: 0; margin: 4px 0;
      cursor: default;
      pointer-events: none;
    }
    /* ── Sous-menu Zoom ── */
    .mnu-sub {
      position: relative;
    }
    .mnu-sub::after {
      content: ' ▶';
      float: right;
      font-size: 0.7em;
      margin-top: 2px;
    }
    .mnu-subsub {
      display: none;
      position: absolute;
      left: 100%;
      top: 0;
      background-color: #2a2d35;
      border: 1px solid #555;
      min-width: 100px;
      list-style: none;
      margin: 0; padding: 4px 0;
      box-shadow: 2px 4px 10px rgba(0,0,0,0.4);
      z-index: 400;
    }
    .mnu-sub:hover > .mnu-subsub { display: block; }
    .mnu-subsub li {
      padding: 5px 18px;
      color: #e8e8e8;
      cursor: pointer;
      font-size: 0.82em;
      white-space: nowrap;
    }
    .mnu-subsub li:hover { background-color: #373f8a; }
    .mnu-subsub li.actif-zoom { color: #7fc; font-weight: bold; }

    #owFileLabel {
      color: #999;
      font-size: 0.78em;
      display: flex;
      align-items: center;
      padding-left: 20px;
    }

    /* ── Layout principal ── */
    #principal {
      top: 26px !important;
      height: calc(100vh - 26px) !important;
    }
    #secondaire {
      top: 26px !important;
      height: calc(100vh - 26px) !important;
    }

    /* ── Réglette ── */
    #owRegle {
      position: absolute;
      top: 0; left: 0;
      padding: 0; margin: 0;
      width: 12960px;
      height: 50px;
      border-top: 1px solid #8a8a8a;
      transform-origin: 0 0;
    }
    #owReglette {
      display: block;
      background-color: #e8e8e8;
      cursor: default;
    }
    #owReglette:active { cursor: ew-resize; }
    #owZoomLabel {
      font-size: 0.75em;
      color: #555;
      margin-left: 16px;
      display: flex;
      align-items: center;
    }

    /* ── Panneau gauche : Sections ── */
    #owSectionHeader {
      padding: 5px 4px;
      border: 1px solid #aaa;
      margin: 4px;
      text-align: center;
      font-weight: bold;
      font-size: 0.9em;
      background-color: #d8e4f0;
      letter-spacing: 1px;
    }
    #owSectionList {
      padding: 2px 4px;
      font-size: 0.8em;
      overflow-y: auto;
      max-height: 600px;
    }
    .ow-sec-item {
      padding: 3px 4px 3px 6px;
      border-left: 3px solid #4a90d9;
      margin: 2px 0;
      cursor: default;
      color: #222;
    }

    /* ── Sections dans l'espace de travail ── */
    .ow-section-line {
      position: absolute;
      left: 0;
      width: 12960px;
      height: 0;
      border-top: 2px solid #4a90d9;
      z-index: 2;
      pointer-events: none;
    }
    .ow-section-lbl {
      position: absolute;
      top: 3px;
      left: 4px;
      font-size: 0.72em;
      color: #4a90d9;
      background: rgba(255,255,255,0.85);
      padding: 1px 5px;
      pointer-events: none;
      z-index: 3;
      font-weight: bold;
    }

    /* ── Groupes ── */
    .ow-grp {
      position: absolute;
      border: 1px solid #4a90d9;
      background-color: rgba(200, 220, 255, 0.45);
      cursor: move;
      z-index: 5;
      min-width: 40px;
      min-height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-sizing: border-box;
    }
    .ow-grp.actif {
      border: 2px solid #e04400;
      box-shadow: 0 0 4px rgba(224,68,0,0.5);
    }
    .ow-grp-lbl {
      pointer-events: none;
      font-size: 0.75em;
      text-align: center;
      word-break: break-word;
      padding: 2px;
      position: relative;
      z-index: 2;
    }
    .ow-drawn-obj { pointer-events: none; position: absolute; }

    /* ── Popups communs ── */
    .ow-popup {
      position: absolute;
      background: #f9f9fd;
      border: 1px solid #888;
      display: none;
      z-index: 400;
      box-shadow: 3px 5px 14px rgba(0,0,0,0.3);
    }
    .ow-popup-hd {
      margin: 0;
      padding: 5px 8px;
      width: 100%;
      height: 26px;
      background-color: #313237;
      border-bottom: 1px solid #000;
      color: #e8e8e8;
      font-size: 1em;
      font-weight: bold;
      box-sizing: border-box;
      cursor: move;
    }
    .ow-popup-body { padding: 12px; }
    .ow-popup-foot {
      padding: 6px 12px;
      text-align: right;
      border-top: 1px solid #ddd;
    }

    /* ── Préférences ── */
    #prefTabBar {
      display: flex;
      background: #e2e2e2;
      border-bottom: 1px solid #ccc;
    }
    .pref-tab {
      padding: 5px 16px;
      cursor: pointer;
      font-size: 0.82em;
      border-right: 1px solid #ccc;
    }
    .pref-tab.actif {
      background: #f9f9fd;
      font-weight: bold;
    }
    .pref-pane { display: none; padding: 10px; max-height: 280px; overflow-y: auto; }
    .pref-pane.actif { display: block; }
    .nuance-row {
      display: flex; align-items: center; margin: 3px 0;
    }
    .nuance-row label { width: 52px; font-weight: bold; font-size: 0.85em; }
    .nuance-row input[type=number] { width: 70px; }
  </style>
</head>
<body>

<!-- ════════════════════════ MENU BAR ════════════════════════ -->
<div id="owMenuBar">

  <div class="mnu-item" id="mnuFichier">Fichier
    <ul class="mnu-drop">
      <li onclick="owOuvrir()">Ouvrir</li>
    </ul>
  </div>

  <div class="mnu-item" id="mnuPrefs">Préférences
    <ul class="mnu-drop">
      <li onclick="owOuvrirPrefs()">Nuances</li>
    </ul>
  </div>

  <span id="owFileLabel">Sans titre</span>
</div>

<!-- ════════════════════════ PANNEAU GAUCHE ════════════════════════ -->
<div id="principal">
  <h2 style="font-size:0.95em;margin:4px 0;">Interpretor</h2>
  <div id="owSectionHeader">Sections</div>
  <div id="owSectionList"></div>
</div>

<!-- ════════════════════════ ESPACE SECONDAIRE ════════════════════════ -->
<div id="secondaire">
  <div id="paramGlobal">
    <span id="compteur" style="margin-left:6px;">interpretor</span> :
    <span id="compteurH" style="font-size:1.5em;"> 00 :</span><span id="compteurM" style="font-size:1.5em;"> 00 : </span><span id="compteurS" style="font-size:1.5em;"> 00</span>
    <span style="margin-left:30px;">M :</span>
    <input id="owNbMesure" type="number" min="1" max="16" step="1" value="4"
           style="width:40px;margin-left:4px;" title="Nombre de temps par mesure"
           oninput="owRedrawReglette()" />
    <select id="owNbDiv" size="1" style="margin-left:6px;" title="Subdivision" onchange="owRedrawReglette()">
      <option value="0.25">1</option>
      <option value="0.5">2</option>
      <option value="1" selected>4</option>
      <option value="2">8</option>
      <option value="4">16</option>
    </select>
    <span id="owGrpInfo" style="margin-left:20px;font-size:0.85em;color:#555;"></span>
    <span id="owZoomLabel">Zoom : <b id="owZoomVal">100</b> %</span>
    <span style="margin-left:40px;">Contexte</span> : <span id="owRate" style="margin-left:6px;">48000</span>
  </div>

  <div id="work" style="position:absolute;top:38px;left:0;width:12960px;height:788px;overflow-x:scroll;overflow-y:hidden;border:0;">
    <!-- Réglette temporelle + mesures -->
    <div id="owRegle" style="position:absolute;top:0;left:0;width:12960px;height:50px;">
      <svg id="owReglette" width="12960" height="50"
           viewBox="0 0 12960 50"
           xmlns="http://www.w3.org/2000/svg">
        <style>.owRSmall{font:0.72em sans-serif;}</style>
      </svg>
    </div>
    <div id="work2" style="position:absolute;top:52px;left:0;width:12960px;height:736px;overflow-x:hidden;overflow-y:scroll;border:1px solid #ccc;">
      <div id="spaceBkg" style="position:absolute;top:0;left:0;width:12960px;height:3000px;z-index:0;background:#f5f5f5;"></div>
      <div id="space" style="position:absolute;top:0;left:0;width:12960px;height:3000px;z-index:1;background:transparent;"
           onclick="owSpaceClick(event)" oncontextmenu="event.preventDefault();">
        <div id="selector" style="position:absolute;top:0;left:0;width:10px;height:10px;border:1px dashed #000;display:none;z-index:10;"></div>
      </div>
    </div>
  </div>
</div>

<!-- Input fichier caché pour ouverture -->
<input type="file" id="owFileInput" style="display:none" accept=".owk,.json" />

<!-- ════════════════════════ POPUP : Paramètres groupe ════════════════════════ -->
<div id="grpParamsPopup" class="ow-popup" style="top:100px;left:360px;width:360px;">
  <div id="grpParamsPopupHeader" class="ow-popup-hd">Paramètres du groupe</div>
  <div class="ow-popup-body">
    <table border="0" cellpadding="5">
      <tbody>
        <tr><td>Nom :</td>
            <td><input id="gpNom" type="text" style="width:200px;" oninput="owUpdateGrp('nom')"/></td></tr>
        <tr><td>Largeur :</td>
            <td><input id="gpW" type="number" min="20" max="2000" value="120" style="width:80px;" oninput="owUpdateGrp('w')"/></td></tr>
        <tr><td>Hauteur :</td>
            <td><input id="gpH" type="number" min="20" max="800" value="60" style="width:80px;" oninput="owUpdateGrp('h')"/></td></tr>
        <tr><td>Couleur :</td>
            <td><input id="gpColor" type="color" value="#c8dcff" oninput="owUpdateGrp('color')"/></td></tr>
        <tr><td>Opacité :</td>
            <td><input id="gpOpacity" type="number" min="0.05" max="1" step="0.05" value="0.5" style="width:80px;" oninput="owUpdateGrp('opacity')"/></td></tr>
        <tr><td>Nuance :</td>
            <td><select id="gpNuance" oninput="owUpdateGrp('nuance')" style="width:160px;">
              <option value="">—</option>
            </select></td></tr>
      </tbody>
    </table>
  </div>
  <div class="ow-popup-foot">
    <button onclick="document.getElementById('grpParamsPopup').style.display='none'">Fermer</button>
  </div>
</div>

<!-- ════════════════════════ POPUP : Permutation sections ════════════════════════ -->
<div id="permutPopup" class="ow-popup" style="top:140px;left:380px;width:300px;">
  <div id="permutPopupHeader" class="ow-popup-hd">Permuter deux sections</div>
  <div class="ow-popup-body">
    <div style="margin-bottom:8px;">Section 1 :
      <select id="permSec1" style="width:170px;margin-left:4px;"></select>
    </div>
    <div>Section 2 :
      <select id="permSec2" style="width:170px;margin-left:4px;"></select>
    </div>
  </div>
  <div class="ow-popup-foot">
    <button onclick="document.getElementById('permutPopup').style.display='none'">Annuler</button>
    &nbsp;
    <button onclick="owDoPermuter()">Permuter</button>
  </div>
</div>

<!-- ════════════════════════ POPUP : Préférences ════════════════════════ -->
<div id="prefsPopup" class="ow-popup" style="top:90px;left:330px;width:360px;">
  <div id="prefsPopupHeader" class="ow-popup-hd">Préférences</div>
  <div id="prefTabBar">
    <div class="pref-tab actif" onclick="owShowPrefTab('nuances')">Nuances</div>
  </div>
  <div id="prefPaneNuances" class="pref-pane actif">
    <table border="0" cellpadding="3">
      <tbody id="nuancesBody"></tbody>
    </table>
    <div style="margin-top:8px;">
      <button onclick="owAjouterNuance()" style="font-size:0.8em;">+ Ajouter</button>
      <button onclick="owSupprimerNuance()" style="font-size:0.8em;margin-left:6px;">- Supprimer</button>
    </div>
  </div>
  <div class="ow-popup-foot">
    <button onclick="document.getElementById('prefsPopup').style.display='none'">Fermer</button>
  </div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════
//  DONNÉES
// ═══════════════════════════════════════════════
let owSections  = [];   // {id, name, posY, color}
let owGroups    = [];   // {id, name, sectionId, posX, posY, w, h, color, opacity, nuance}
let owNuances   = [
  {nom:'pppp', val:10}, {nom:'ppp', val:20}, {nom:'pp', val:30},
  {nom:'p',    val:40}, {nom:'mp',  val:50}, {nom:'mf', val:60},
  {nom:'f',    val:70}, {nom:'ff',  val:80}, {nom:'fff',val:90},
  {nom:'ffff', val:100}
];
let owNextSecId  = 1;
let owNextGrpId  = 1;
let owActiveGrp  = null;
let owFilePath   = null;
let owModified   = false;
let interpDir    = '';        // dossier de la partition ouverte
let interpGrpData = {};       // {grpId: {xml, imgBase}} — cache des XMLs de groupe

// ═══════════════════════════════════════════════
//  MENU – ouverture / fermeture
// ═══════════════════════════════════════════════
let owOpenMenu = null;

document.querySelectorAll('.mnu-item').forEach(item => {
  item.addEventListener('click', function(e) {
    e.stopPropagation();
    const id = this.id;
    if (owOpenMenu === id) {
      this.classList.remove('open');
      owOpenMenu = null;
    } else {
      if (owOpenMenu) document.getElementById(owOpenMenu).classList.remove('open');
      this.classList.add('open');
      owOpenMenu = id;
    }
  });
});
document.addEventListener('click', function() {
  if (owOpenMenu) {
    document.getElementById(owOpenMenu).classList.remove('open');
    owOpenMenu = null;
  }
});
function owCloseMenus() {
  if (owOpenMenu) {
    document.getElementById(owOpenMenu).classList.remove('open');
    owOpenMenu = null;
  }
}

// ═══════════════════════════════════════════════
//  FICHIER
// ═══════════════════════════════════════════════
function owNouveau() {
  owCloseMenus();
  if (owModified && !confirm('Nouveau projet ? Les modifications non sauvegardées seront perdues.')) return;
  owSections = []; owGroups = [];
  owNextSecId = 1; owNextGrpId = 1;
  owActiveGrp = null; owFilePath = null; owModified = false;
  document.getElementById('owFileLabel').textContent = 'Sans titre';
  owRenderAll();
}

function owOuvrir() {
  owCloseMenus();
  if (typeof window.api !== 'undefined') {
    window.api.send('toMain', 'interpOpen');
  } else {
    document.getElementById('owFileInput').click();
  }
}

document.getElementById('owFileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) { owParseData(ev.target.result, file.name); };
  reader.readAsText(file);
  this.value = '';
});

function owParseData(txt, label) {
  try {
    if (txt.trimStart().startsWith('<')) {
      owParseDataXml(txt);
    } else {
      const d = JSON.parse(txt);
      owSections  = d.sections  || [];
      owGroups    = d.groups    || [];
      owNuances   = d.nuances   || owNuances;
      owNextSecId = d.nextSecId || owSections.length + 1;
      owNextGrpId = d.nextGrpId || owGroups.length   + 1;
      owActiveGrp = null; owModified = false;
      if (label) document.getElementById('owFileLabel').textContent = label;
      owRenderAll(); owBuildNuancesTable();
    }
  } catch(err) { alert('Erreur de chargement : ' + err.message); }
}

function owParseDataXml(txt) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(txt, 'application/xml');
  if (doc.querySelector('parsererror'))
    throw new Error(doc.querySelector('parsererror').textContent.split('\n')[0]);
  const ga  = (el,a,d='')  => { const v=el.getAttribute(a); return v!==null?v:d; };
  const gaf = (el,a,d=0)   => { const v=parseFloat(el.getAttribute(a)); return isNaN(v)?d:v; };
  const gai = (el,a,d=0)   => { const v=parseInt(el.getAttribute(a));   return isNaN(v)?d:v; };
  owSections=[]; owGroups=[]; owNextSecId=1; owNextGrpId=1; interpGrpData={};
  const partEl = doc.querySelector('partition');
  const title  = (partEl && partEl.getAttribute('name')) || 'Sans titre';
  document.getElementById('owFileLabel').textContent = title;
  doc.querySelectorAll('section').forEach((secEl, idx) => {
    const secId = owNextSecId++;
    owSections.push({ id:secId, name:ga(secEl,'name','Section '+secId), posY:idx*200, color:'#4a90d9' });
    secEl.querySelectorAll('groupe').forEach(grpEl => {
      owGroups.push({
        id: owNextGrpId++,
        name:    ga(grpEl,'name',''),
        sectionId: secId,
        posX:    gaf(grpEl,'posX',20),
        posY:    gaf(grpEl,'posY',20),
        w:       gai(grpEl,'w',120),
        h:       gai(grpEl,'h',60),
        color:   ga(grpEl,'color','#c8dcff'),
        opacity: gaf(grpEl,'opacity',0.5),
        dir:     ga(grpEl,'dir',''),
        nuance:  ''
      });
    });
  });
  owActiveGrp=null; owModified=false;
  owRenderAll(); owBuildNuancesTable();
  // Demander les XMLs de groupe via IPC
  if (typeof window.api !== 'undefined') {
    owGroups.forEach(grp => {
      if (grp.name) window.api.send('toMain', `interpLoadGrp;${grp.id};${grp.name}`);
    });
  }
}

function owSerialise() {
  return JSON.stringify({
    sections: owSections, groups: owGroups,
    nuances: owNuances, nextSecId: owNextSecId, nextGrpId: owNextGrpId
  }, null, 2);
}

function owSauvegarder() {
  owCloseMenus();
  if (typeof window.api !== 'undefined') {
    window.api.send('toMain', 'owSave;' + (owFilePath || '') + ';' + owSerialise());
  } else {
    owTelecharger(owFilePath || 'projet.owk', owSerialise());
  }
}

function owSauvegarderSous() {
  owCloseMenus();
  if (typeof window.api !== 'undefined') {
    window.api.send('toMain', 'owSaveAs;' + owSerialise());
  } else {
    const nom = prompt('Nom du fichier :', owFilePath || 'projet.owk');
    if (nom) owTelecharger(nom, owSerialise());
  }
}

function owTelecharger(nom, contenu) {
  const blob = new Blob([contenu], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = nom.endsWith('.owk') ? nom : nom + '.owk';
  a.click();
  URL.revokeObjectURL(url);
  owModified = false;
}

function owExporterInterpretor() {
  owCloseMenus();
  const exp = {
    type: 'openwork',
    sections: owSections.map(s => ({id:s.id, name:s.name, posY:s.posY})),
    groups: owGroups.map(g => ({
      id:g.id, name:g.name, sectionId:g.sectionId,
      posX:g.posX, posY:g.posY, w:g.w, h:g.h,
      nuance:g.nuance, color:g.color
    })),
    nuances: owNuances
  };
  const txt = JSON.stringify(exp, null, 2);
  if (typeof window.api !== 'undefined') {
    window.api.send('toMain', 'owExportInterp;' + txt);
  } else {
    owTelecharger('interpretor_export.json', txt);
  }
}

// ═══════════════════════════════════════════════
//  ÉDITION – SECTIONS
// ═══════════════════════════════════════════════
function owAjouterSection() {
  owCloseMenus();
  const name = prompt('Nom de la section :', 'Section ' + owNextSecId);
  if (!name) return;
  const sorted = [...owSections].sort((a,b) => a.posY - b.posY);
  let posY = 20;
  if (sorted.length > 0) {
    posY = sorted.at(-1).posY + 100;
    if (posY > 2800) posY = 2800;
  }
  owSections.push({id: owNextSecId++, name, posY, color:'#4a90d9'});
  owModified = true;
  owRenderAll();
}

function owSupprimerSection() {
  owCloseMenus();
  if (owSections.length === 0) { alert('Aucune section à supprimer.'); return; }
  const liste = [...owSections].sort((a,b)=>a.posY-b.posY)
    .map(s => s.id + ' → ' + s.name).join('\n');
  const saisie = prompt('ID de la section à supprimer :\n' + liste);
  if (!saisie) return;
  const id = parseInt(saisie);
  const idx = owSections.findIndex(s => s.id === id);
  if (idx === -1) { alert('Section non trouvée.'); return; }
  owGroups    = owGroups.filter(g => g.sectionId !== id);
  owSections.splice(idx, 1);
  if (!owGroups.find(g => g.id === owActiveGrp)) owActiveGrp = null;
  owModified = true;
  owRenderAll();
}

function owPermuter() {
  owCloseMenus();
  if (owSections.length < 2) { alert('Il faut au moins deux sections.'); return; }
  const sorted = [...owSections].sort((a,b) => a.posY - b.posY);
  ['permSec1','permSec2'].forEach((selId, i) => {
    const sel = document.getElementById(selId);
    sel.innerHTML = '';
    sorted.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.name;
      sel.appendChild(opt);
    });
    if (i === 1 && sorted.length >= 2) sel.selectedIndex = 1;
  });
  document.getElementById('permutPopup').style.display = 'block';
}

function owDoPermuter() {
  const id1 = parseInt(document.getElementById('permSec1').value);
  const id2 = parseInt(document.getElementById('permSec2').value);
  if (id1 === id2) { alert('Sélectionner deux sections différentes.'); return; }
  const s1 = owSections.find(s => s.id === id1);
  const s2 = owSections.find(s => s.id === id2);
  if (!s1 || !s2) return;
  const dy = s2.posY - s1.posY;
  owGroups.forEach(g => {
    if (g.sectionId === id1) { g.posY += dy; g.sectionId = id2; }
    else if (g.sectionId === id2) { g.posY -= dy; g.sectionId = id1; }
  });
  const tmp = s1.posY;
  s1.posY = s2.posY;
  s2.posY = tmp;
  document.getElementById('permutPopup').style.display = 'none';
  owModified = true;
  owRenderAll();
}

// ═══════════════════════════════════════════════
//  ÉDITION – GROUPES
// ═══════════════════════════════════════════════
function owAjouterGroupe() {
  owCloseMenus();
  if (owSections.length === 0) { alert('Créez d\'abord une section.'); return; }
  const name = prompt('Nom du groupe :', 'Groupe ' + owNextGrpId);
  if (!name) return;
  const sec = [...owSections].sort((a,b) => a.posY - b.posY)[0];
  const grp = {
    id: owNextGrpId++, name,
    sectionId: sec.id,
    posX: 20, posY: sec.posY + 20,
    w: 120, h: 60,
    color: '#c8dcff', opacity: 0.5, nuance: ''
  };
  owGroups.push(grp);
  owActiveGrp = grp.id;
  owModified  = true;
  owRenderAll();
  owUpdateInfo();
}

function owSupprimerGroupe() {
  owCloseMenus();
  if (owActiveGrp === null) { alert('Sélectionnez d\'abord un groupe.'); return; }
  const grp = owGroups.find(g => g.id === owActiveGrp);
  if (!grp) return;
  if (!confirm('Supprimer le groupe « ' + grp.name + ' » ?')) return;
  owGroups    = owGroups.filter(g => g.id !== owActiveGrp);
  owActiveGrp = null;
  owModified  = true;
  owRenderAll();
  owUpdateInfo();
}

function owParamsGroupe() {
  owCloseMenus();
  if (owActiveGrp === null) { alert('Sélectionnez d\'abord un groupe.'); return; }
  const grp = owGroups.find(g => g.id === owActiveGrp);
  if (!grp) return;
  document.getElementById('gpNom').value      = grp.name;
  document.getElementById('gpW').value        = grp.w;
  document.getElementById('gpH').value        = grp.h;
  document.getElementById('gpColor').value    = grp.color;
  document.getElementById('gpOpacity').value  = grp.opacity;
  // Reconstruire le select nuances
  const sel = document.getElementById('gpNuance');
  sel.innerHTML = '<option value="">—</option>';
  owNuances.forEach(n => {
    const opt = document.createElement('option');
    opt.value = n.nom;
    opt.textContent = n.nom + ' (' + n.val + ')';
    if (n.nom === grp.nuance) opt.selected = true;
    sel.appendChild(opt);
  });
  document.getElementById('grpParamsPopup').style.display = 'block';
}

function owUpdateGrp(param) {
  if (owActiveGrp === null) return;
  const grp = owGroups.find(g => g.id === owActiveGrp);
  if (!grp) return;
  switch (param) {
    case 'nom':     grp.name    = document.getElementById('gpNom').value; break;
    case 'w':       grp.w       = Math.max(20, parseInt(document.getElementById('gpW').value)||120); break;
    case 'h':       grp.h       = Math.max(20, parseInt(document.getElementById('gpH').value)||60); break;
    case 'color':   grp.color   = document.getElementById('gpColor').value; break;
    case 'opacity': grp.opacity = parseFloat(document.getElementById('gpOpacity').value)||0.5; break;
    case 'nuance':  grp.nuance  = document.getElementById('gpNuance').value; break;
  }
  owModified = true;
  const el = document.getElementById('grp' + grp.id);
  if (el) owApplyGrpStyle(el, grp);
}

// ═══════════════════════════════════════════════
//  PRÉFÉRENCES – NUANCES
// ═══════════════════════════════════════════════
function owOuvrirPrefs() {
  owCloseMenus();
  owBuildNuancesTable();
  document.getElementById('prefsPopup').style.display = 'block';
}

function owShowPrefTab(tab) {
  document.querySelectorAll('.pref-pane').forEach(p => p.classList.remove('actif'));
  document.querySelectorAll('.pref-tab').forEach(t => t.classList.remove('actif'));
  document.getElementById('prefPane' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('actif');
  document.querySelector('.pref-tab[onclick*="' + tab + '"]').classList.add('actif');
}

function owBuildNuancesTable() {
  const tbody = document.getElementById('nuancesBody');
  tbody.innerHTML = '';
  owNuances.forEach((n, i) => {
    const tr = document.createElement('tr');
    tr.className = 'nuance-row';
    tr.innerHTML =
      '<td><label>' + n.nom + '</label></td>' +
      '<td><input type="number" min="0" max="127" step="1" value="' + n.val + '" ' +
      'style="width:70px;" data-idx="' + i + '" oninput="owNuanceVal(this)"/></td>';
    tbody.appendChild(tr);
  });
}

function owNuanceVal(inp) {
  owNuances[parseInt(inp.dataset.idx)].val = parseInt(inp.value) || 0;
  owModified = true;
}

function owAjouterNuance() {
  const nom = prompt('Nom de la nuance :', 'n' + (owNuances.length + 1));
  if (!nom) return;
  owNuances.push({nom, val: 60});
  owBuildNuancesTable();
  owModified = true;
}

function owSupprimerNuance() {
  if (owNuances.length === 0) return;
  const last = owNuances.at(-1);
  if (!confirm('Supprimer « ' + last.nom + ' » ?')) return;
  owNuances.pop();
  owBuildNuancesTable();
  owModified = true;
}

// ═══════════════════════════════════════════════
//  RENDU
// ═══════════════════════════════════════════════
function owRenderAll() {
  owRenderSections();
  owRenderGroups();
  owBuildSectionList();
}

function owRenderSections() {
  document.querySelectorAll('.ow-section-line').forEach(el => el.remove());
  const space = document.getElementById('space');
  owSections.forEach(sec => {
    const div = document.createElement('div');
    div.className = 'ow-section-line';
    div.id        = 'owsec' + sec.id;
    div.style.top = sec.posY + 'px';
    div.style.borderTopColor = sec.color || '#4a90d9';

    const lbl = document.createElement('span');
    lbl.className   = 'ow-section-lbl';
    lbl.textContent = sec.name;
    lbl.style.color = sec.color || '#4a90d9';
    div.appendChild(lbl);
    space.appendChild(div);
  });
}

function owRenderGroups() {
  document.querySelectorAll('.ow-grp').forEach(el => el.remove());
  const space = document.getElementById('space');
  owGroups.forEach(grp => {
    const div = document.createElement('div');
    div.className = 'ow-grp' + (grp.id === owActiveGrp ? ' actif' : '');
    div.id        = 'grp' + grp.id;
    owApplyGrpStyle(div, grp);
    div.style.left = grp.posX + 'px';
    div.style.top  = grp.posY + 'px';

    const lbl = document.createElement('span');
    lbl.className   = 'ow-grp-lbl';
    lbl.textContent = grp.name + (grp.nuance ? ' [' + grp.nuance + ']' : '');
    div.appendChild(lbl);

    div.addEventListener('mousedown', function(e) {
      e.stopPropagation();
      owSelectGrp(grp.id);
      owDragElement(div, grp, e);
    });
    space.appendChild(div);
    if (interpGrpData[grp.id]) {
      const { xml, imgBase } = interpGrpData[grp.id];
      drawObjets(xml, div, imgBase);
    }
  });
}

function owApplyGrpStyle(el, grp) {
  el.style.width           = grp.w + 'px';
  el.style.height          = grp.h + 'px';
  el.style.borderColor     = grp.color || '#4a90d9';
  el.style.backgroundColor = owHexRgba(grp.color || '#c8dcff', grp.opacity ?? 0.45);
  const lbl = el.querySelector('.ow-grp-lbl');
  if (lbl) lbl.textContent = grp.name + (grp.nuance ? ' [' + grp.nuance + ']' : '');
}

function owHexRgba(hex, a) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}

function owBuildSectionList() {
  const div = document.getElementById('owSectionList');
  div.innerHTML = '';
  [...owSections].sort((a,b) => a.posY - b.posY).forEach(sec => {
    const item      = document.createElement('div');
    item.className  = 'ow-sec-item';
    item.style.borderLeftColor = sec.color || '#4a90d9';
    item.textContent = sec.name;
    div.appendChild(item);
  });
}

function owSelectGrp(id) {
  owActiveGrp = id;
  document.querySelectorAll('.ow-grp').forEach(el => el.classList.remove('actif'));
  const el = document.getElementById('grp' + id);
  if (el) el.classList.add('actif');
  owUpdateInfo();
}

function owUpdateInfo() {
  const el = document.getElementById('owGrpInfo');
  if (owActiveGrp !== null) {
    const grp = owGroups.find(g => g.id === owActiveGrp);
    if (grp) {
      const sec = owSections.find(s => s.id === grp.sectionId);
      el.textContent = 'Groupe actif : ' + grp.name
        + (sec ? '  |  Section : ' + sec.name : '');
      return;
    }
  }
  el.textContent = '';
}

function owSpaceClick(e) {
  if (e.target.id === 'space' || e.target.id === 'spaceBkg' || e.target.id === 'selector') {
    owActiveGrp = null;
    document.querySelectorAll('.ow-grp').forEach(el => el.classList.remove('actif'));
    owUpdateInfo();
  }
}

// ═══════════════════════════════════════════════
//  DESSIN DES OBJETS DE GROUPE
// ═══════════════════════════════════════════════

function parseObjetEl(el) {
  const v  = (tag, d='') => { const e=el.querySelector(tag); return e?(e.getAttribute('value')??d):d; };
  const vf = (tag, d=0)  => { const n=parseFloat(v(tag,String(d))); return isNaN(n)?d:n; };
  const vi = (tag, d=0)  => { const n=parseInt(v(tag,String(d)));   return isNaN(n)?d:n; };
  return {
    id:        el.getAttribute('id')||'',
    type:      vi('type'),
    class:     vi('class'),
    posX:      vf('posx'),   posY: vf('posy'),
    bkgWidth:  vf('bkgwidth',20), bkgHeight: vf('bkgheight',20),
    bkgColor:  v('bkgcolor','#ffffff'),
    bkgOpacity:vf('bkgopacity',1),
    bkgTrp:    v('bkgtrp','true')==='true',
    borderGc:v('bordergc','#000000'), borderGw:vf('bordergw'),
    borderHc:v('borderhc','#000000'), borderHw:vf('borderhw'),
    borderDc:v('borderdc','#000000'), borderDw:vf('borderdw'),
    borderBc:v('borderbc','#000000'), borderBw:vf('borderbw'),
    width:   vf('width',20),  height:  vf('height',20),
    margeG:  vf('margeg'),    margeH:  vf('margeh'),
    objColor:  v('objcolor','#000000'),
    objBorderC:v('objborderc','#000000'), objBorderW:vf('objborderw'),
    scaleX:  vf('scalex',1),  scaleY:  vf('scaley',1), scaleY2:vf('scaley2',1),
    rotate:  vf('rotation', vf('rotate')),
    r:  vf('r',10), cx:vf('cx',10), cy:vf('cy',10), rx:vf('rx',20), ry:vf('ry',10),
    x1: vf('x1'),   y1:vf('y1'),    x2:vf('x2'),    y2:vf('y2'),
    cp1x:vf('cp1x',25), cp1y:vf('cp1y',30),
    cp2x:vf('cp2x',45), cp2y:vf('cp2y',30),
    img: v('imag','')
  };
}

function buildObjSvg(o, imgBasePath) {
  const sc = `scale(${o.scaleX},${o.scaleY}) translate(${o.margeG},${o.margeH})`;
  switch (o.type) {
    case 1: {
      const r = o.r * o.scaleX;
      return `<circle cx="${(o.r+o.margeG)*o.scaleX}" cy="${(o.r+o.margeH)*o.scaleX}" r="${r}" fill="${o.objColor}" stroke="${o.objBorderC}" stroke-width="${o.objBorderW}"/>`;
    }
    case 2: case 5:
      return `<rect x="${o.objBorderW+o.margeG}" y="${o.objBorderW+o.margeH}" width="${Math.max(0,o.width*o.scaleX-o.objBorderW*2)}" height="${Math.max(0,o.height*o.scaleY-o.objBorderW*2)}" fill="${o.objColor}" stroke="${o.objBorderC}" stroke-width="${o.objBorderW}"/>`;
    case 3:
      return `<polyline points="0,20 0,0 20,10 0,20" fill="${o.objColor}" transform="scale(${o.scaleX},${o.scaleY}) translate(${o.margeG},${o.margeH}) rotate(${o.rotate} 10 10)" stroke="${o.objBorderC}" stroke-width="${o.objBorderW}"/>`;
    case 4:
      return `<ellipse cx="${o.cx}" cy="${o.cy}" rx="${o.rx}" ry="${o.ry}" fill="${o.objColor}" transform="${sc}" stroke="${o.objBorderC}" stroke-width="${o.objBorderW}"/>`;
    case 6:
      return `<polyline points="0,0 0,10 50,5 0,0" fill="${o.objColor}" transform="${sc}" stroke="${o.objBorderC}" stroke-width="${o.objBorderW}"/>`;
    case 7: {
      const r7=10*o.scaleY2, ly7=r7-(10*o.scaleY)/2+o.margeH;
      return `<circle cx="${r7+o.margeG}" cy="${r7+o.margeH}" r="${r7}" fill="${o.objColor}" stroke="${o.objBorderC}" stroke-width="${o.objBorderW}"/>` +
             `<rect x="${r7+o.margeG}" y="${ly7}" width="${20*o.scaleX}" height="${10*o.scaleY}" fill="${o.objColor}"/>`;
    }
    case 8: {
      const ly8=(10*o.scaleY2+o.margeH)-(10*o.scaleY)/2;
      return `<rect x="${o.margeG}" y="${o.margeH}" width="${20*o.scaleY2}" height="${20*o.scaleY2}" fill="${o.objColor}" stroke="${o.objBorderC}" stroke-width="${o.objBorderW}"/>` +
             `<rect x="${10*o.scaleY2+o.margeG}" y="${ly8}" width="${20*o.scaleX-5*o.scaleY2}" height="${10*o.scaleY}" fill="${o.objColor}"/>`;
    }
    case 9:
      return `<path d="M 0,10 0,5 50,0 50,15 0,10 Z" fill="${o.objColor}" transform="${sc}" stroke="${o.objBorderC}" stroke-width="${o.objBorderW}"/>`;
    case 10:
      return `<line x1="${o.margeG*o.scaleX}" y1="${o.margeH*o.scaleY}" x2="${o.width*o.scaleX+o.margeG}" y2="${o.margeH*o.scaleY}" stroke="${o.objColor}" stroke-width="${o.height}"/>`;
    case 11:
      return `<line x1="${o.x1}" y1="${o.y1}" x2="${o.x2}" y2="${o.y2}" stroke="${o.objBorderC}" stroke-width="${o.scaleX}"/>`;
    case 12:
      return `<rect x="${o.margeG}" y="${o.margeH}" width="${10*o.scaleX}" height="${40*o.scaleY}" fill="${o.objColor}" stroke="${o.objBorderC}" stroke-width="${o.objBorderW}"/>`;
    case 13:
      return `<path d="M 0 25 Q ${o.cp1x} ${o.cp1y} 50 0 Q ${o.cp2x} ${o.cp2y} 0 40 L 0 25 Z" transform="${sc}" fill="${o.objColor}"/>`;
    case 14:
      return `<path d="M 0 0 Q ${o.cp1x} ${o.cp1y} 40 38 Q ${o.cp2x} ${o.cp2y} 0 7 Z" transform="${sc}" fill="${o.objColor}"/>`;
    case 15:
      return `<path d="M 0 35 L 0 30 Q ${o.cp1x} ${o.cp1y} 50 0 L 50 20 Q ${o.cp2x} ${o.cp2y} 0 35 Z" transform="${sc}" fill="${o.objColor}"/>`;
    case 16:
      return `<path d="M 0 0 Q ${o.cp1x} ${o.cp1y} 50 20 L 50 50 Q ${o.cp2x} ${o.cp2y} 0 5 Z" transform="${sc}" fill="${o.objColor}"/>`;
    case 21:
      return `<path d="m 0,18 c 2.563522,-4.224314 5.082396,-8.502207 9.5544,-10.436343 15.408596,-2.005519 10.194491,-4.131414 15.287035,-6.173611 15.94465,-2.511366 17.400141,2.490165 23.66551,4.997685 2.271129,3.188679 5.724476,4.406994 4.703704,13.082175 -1.620314,13.767922 -5.475164,14.575533 -8.966435,17.4919 -8.306339,2.87551 -16.042438,4.467977 -22.783564,3.821758 -6.306339,0.87551 -14.042438,2.467977 -20.783564,-10.821758 Z" transform="${sc}" fill="${o.objColor}"/>`;
    case 23:
      if (imgBasePath && o.img && window.api) {
        const url = window.api.toFileUrl(window.api.joinPath(imgBasePath, o.img));
        return `<image x="${o.margeG}" y="${o.margeH}" width="${o.bkgWidth*o.scaleX}" height="${o.bkgHeight*o.scaleY}" preserveAspectRatio="none" href="${url}" transform="rotate(${o.rotate} ${o.bkgWidth/2} ${o.bkgHeight/2})"/>`;
      }
      return '';
    default: return '';
  }
}

function drawObjets(grpXml, grpDiv, imgBasePath) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(grpXml, 'application/xml');
  if (doc.querySelector('parsererror')) return;
  // Conteneur class=4 : définit l'espace de coordonnées du groupe
  let ctnX=0, ctnY=0, ctnW=0, ctnH=0;
  for (const el of doc.querySelectorAll('objet')) {
    const clsEl = el.querySelector('class');
    if (clsEl && parseInt(clsEl.getAttribute('value'))||0 === 4) {
      const o = parseObjetEl(el);
      ctnX=o.posX; ctnY=o.posY;
      ctnW=o.bkgWidth||o.width; ctnH=o.bkgHeight||o.height;
      break;
    }
  }
  if (!ctnW || !ctnH) return;
  const divW = grpDiv.offsetWidth  || parseFloat(grpDiv.style.width)  || 120;
  const divH = grpDiv.offsetHeight || parseFloat(grpDiv.style.height) || 60;
  const sx   = divW / ctnW;
  const sy   = divH / ctnH;
  grpDiv.querySelectorAll('.ow-drawn-obj').forEach(e => e.remove());
  for (const el of doc.querySelectorAll('objet')) {
    const o     = parseObjetEl(el);
    if (o.class === 4 || o.class === 0) continue;
    const shape = buildObjSvg(o, imgBasePath);
    if (!shape) continue;
    let bkg = '';
    if (!o.bkgTrp) {
      const op = Math.round(o.bkgOpacity*255).toString(16).padStart(2,'0');
      bkg = `<rect x="0" y="0" width="${o.bkgWidth}" height="${o.bkgHeight}" fill="${o.bkgColor}${op}"/>`;
    }
    const rx = (o.posX - ctnX) * sx;
    const ry = (o.posY - ctnY) * sy;
    const w  = Math.max(1, o.bkgWidth  * sx);
    const h  = Math.max(1, o.bkgHeight * sy);
    const div = document.createElement('div');
    div.className = 'ow-drawn-obj';
    div.style.cssText = `left:${rx}px;top:${ry}px;`;
    div.innerHTML = `<svg width="${w}" height="${h}" viewBox="0 0 ${o.bkgWidth} ${o.bkgHeight}" xmlns="http://www.w3.org/2000/svg">${bkg}${shape}</svg>`;
    grpDiv.appendChild(div);
  }
}

// ═══════════════════════════════════════════════
//  DRAG ELEMENT – groupes seulement (grp*)
// ═══════════════════════════════════════════════
function owDragElement(elmnt, grpData, startEvt) {
  let p1=0, p2=0, p3=startEvt.clientX, p4=startEvt.clientY;

  document.onmousemove = drag;
  document.onmouseup   = stop;

  function drag(e) {
    e.preventDefault();
    p1 = p3 - e.clientX;
    p2 = p4 - e.clientY;
    p3 = e.clientX;
    p4 = e.clientY;
    grpData.posX = Math.max(0, elmnt.offsetLeft - p1);
    grpData.posY = Math.max(0, elmnt.offsetTop  - p2);
    elmnt.style.left = grpData.posX + 'px';
    elmnt.style.top  = grpData.posY + 'px';
    owAffecterSection(grpData);
  }
  function stop() {
    document.onmousemove = null;
    document.onmouseup   = null;
    owAffecterSection(grpData);
    owModified = true;
  }
}

function owAffecterSection(grp) {
  const sorted = [...owSections].sort((a,b) => a.posY - b.posY);
  let aff = null;
  for (const sec of sorted) {
    if (sec.posY <= grp.posY) aff = sec;
  }
  if (aff) grp.sectionId = aff.id;
  owUpdateInfo();
}

// ═══════════════════════════════════════════════
//  DRAG des popups (via leur header)
// ═══════════════════════════════════════════════
function owMakeDraggable(popup) {
  const hd = popup.querySelector('.ow-popup-hd');
  if (!hd) return;
  let px=0, py=0;
  hd.onmousedown = function(e) {
    e.preventDefault();
    px = e.clientX - popup.offsetLeft;
    py = e.clientY - popup.offsetTop;
    document.onmousemove = mv;
    document.onmouseup   = function() { document.onmousemove = null; document.onmouseup = null; };
  };
  function mv(e) {
    popup.style.left = (e.clientX - px) + 'px';
    popup.style.top  = (e.clientY - py) + 'px';
  }
}
document.querySelectorAll('.ow-popup').forEach(owMakeDraggable);

// ═══════════════════════════════════════════════

if (typeof window.api !== 'undefined') {
  window.api.receive('fromMain', function(data) {
    if (typeof data !== 'string') return;
    const sep  = data.indexOf(';');
    const cmd  = sep > -1 ? data.substring(0, sep) : data;
    const rest = sep > -1 ? data.substring(sep + 1) : '';
    switch (cmd) {
      case 'owSaved':
        owFilePath = rest;
        owModified = false;
        document.getElementById('owFileLabel').textContent = rest.split(/[\\/]/).at(-1);
        break;
      case 'owLoaded': {
        const nl = rest.indexOf('\n');
        if (nl > -1) {
          interpDir = rest.substring(0, nl);
          owParseData(rest.substring(nl + 1));
        } else {
          owParseData(rest);
        }
        break;
      }
      case 'interpGrpLoaded': {
        const parts   = rest.split(';');
        const grpId   = parseInt(parts[0]);
        const imgBase = parts[1] || '';
        const xmlB64  = parts[2] || '';
        if (!xmlB64) break;
        const grpXml = atob(xmlB64);
        const grp    = owGroups.find(g => g.id === grpId);
        if (!grp) break;
        const grpDiv = document.getElementById('grp' + grpId);
        if (!grpDiv) break;
        interpGrpData[grp.id] = { xml: grpXml, imgBase };
        drawObjets(grpXml, grpDiv, imgBase);
        break;
      }
    }
  });
}

// ═══════════════════════════════════════════════
//  COMPTEUR
// ═══════════════════════════════════════════════
// Affiche la position temporelle correspondant à posX (pixels scroll)
function owSetCompteur(posX) {
  const sec  = posX / (OW_BASE_PX * owZoomScale);
  const h    = Math.floor(sec / 3600);
  const m    = Math.floor((sec % 3600) / 60);
  const s    = Math.floor(sec % 60);
  const ms   = Math.floor((sec % 1) * 100);
  document.getElementById('compteurH').textContent = ' ' + String(h).padStart(2,'0') + ' :';
  document.getElementById('compteurM').textContent = ' ' + String(m).padStart(2,'0') + ' : ';
  document.getElementById('compteurS').textContent = ' ' + String(s).padStart(2,'0')
                                                   + '.' + String(ms).padStart(2,'0');
}

function owResetCompteur() {
  document.getElementById('compteurH').textContent = ' 00 :';
  document.getElementById('compteurM').textContent = ' 00 : ';
  document.getElementById('compteurS').textContent = ' 00.00';
}

// Contexte audio – taux d'échantillonnage
(function() {
  try {
    const ctx = new AudioContext();
    document.getElementById('owRate').textContent = ctx.sampleRate;
    ctx.close();
  } catch(e) {
    document.getElementById('owRate').textContent = '48000';
  }
})();

// ═══════════════════════════════════════════════
//  RÉGLETTES + ZOOM
// ═══════════════════════════════════════════════
const OW_SVG = 'http://www.w3.org/2000/svg';
const OW_BASE_PX = 18;   // pixels par seconde à scale=1 (60 BPM)

let owZoomScale = 1.0;

function owCreateReglette() {
  const svg   = document.getElementById('owReglette');
  const scale = owZoomScale;
  const nbmax = 12960 * scale;

  // Vider et redimensionner le SVG
  svg.innerHTML = '<style>.owRSmall{font:0.72em sans-serif;}</style>';
  svg.setAttribute('width', nbmax);
  svg.setAttribute('viewBox', '0 0 ' + nbmax + ' 50');

  // ── Fond ──────────────────────────────────────
  const bg = document.createElementNS(OW_SVG, 'rect');
  bg.setAttribute('x', 0); bg.setAttribute('y', 0);
  bg.setAttribute('width', nbmax); bg.setAttribute('height', 50);
  bg.setAttribute('fill', '#e8e8e8');
  svg.appendChild(bg);

  // ── Ligne séparatrice haute / mesures ─────────
  const sep = document.createElementNS(OW_SVG, 'line');
  sep.setAttribute('x1', 0); sep.setAttribute('y1', 25);
  sep.setAttribute('x2', nbmax); sep.setAttribute('y2', 25);
  sep.setAttribute('stroke', '#aaa'); sep.setAttribute('stroke-width', '0.5');
  svg.appendChild(sep);

  // ── Réglette temporelle (zone 0→25px) ─────────
  const step = OW_BASE_PX * scale;   // px par seconde
  let tickCount = 0;
  for (let p = 0; p < nbmax; p += step, tickCount++) {
    const isMajor = (tickCount % 10 === 0);
    const line = document.createElementNS(OW_SVG, 'line');
    line.setAttribute('x1', p); line.setAttribute('y1', 0);
    line.setAttribute('x2', p); line.setAttribute('y2', isMajor ? 20 : 11);
    line.setAttribute('stroke', '#444'); line.setAttribute('stroke-width', 1);
    svg.appendChild(line);

    if (isMajor && tickCount > 0) {
      const txt = document.createElementNS(OW_SVG, 'text');
      txt.setAttribute('x', p + 2); txt.setAttribute('y', 20);
      txt.setAttribute('class', 'owRSmall'); txt.setAttribute('fill', '#333');
      txt.textContent = tickCount + 's';
      svg.appendChild(txt);
    }
  }

  // ── Réglette de mesures (zone 25→50px) ────────
  const nbmes = parseInt(document.getElementById('owNbMesure').value) || 4;
  const nbdiv = parseFloat(document.getElementById('owNbDiv').value) || 1;
  const beatPx   = OW_BASE_PX * scale;          // px par temps (1s@60BPM)
  const divPx    = beatPx / nbdiv;              // px par subdivision
  const mesurePx = nbmes * beatPx;              // px par mesure

  // Subdivisions
  for (let p = 0; p < nbmax; p += divPx) {
    const line = document.createElementNS(OW_SVG, 'line');
    line.setAttribute('x1', p); line.setAttribute('y1', 25);
    line.setAttribute('x2', p); line.setAttribute('y2', 30);
    line.setAttribute('stroke', '#999'); line.setAttribute('stroke-width', 0.6);
    svg.appendChild(line);
  }

  // Temps (beats)
  for (let p = 0; p < nbmax; p += beatPx) {
    const line = document.createElementNS(OW_SVG, 'line');
    line.setAttribute('x1', p); line.setAttribute('y1', 25);
    line.setAttribute('x2', p); line.setAttribute('y2', 37);
    line.setAttribute('stroke', '#666'); line.setAttribute('stroke-width', 1);
    svg.appendChild(line);
  }

  // Mesures
  let mesNum = 1;
  for (let p = 0; p < nbmax; p += mesurePx, mesNum++) {
    const line = document.createElementNS(OW_SVG, 'line');
    line.setAttribute('x1', p); line.setAttribute('y1', 25);
    line.setAttribute('x2', p); line.setAttribute('y2', 50);
    line.setAttribute('stroke', '#444'); line.setAttribute('stroke-width', 1.5);
    svg.appendChild(line);

    if (mesNum > 1) {
      const txt = document.createElementNS(OW_SVG, 'text');
      txt.setAttribute('x', p + 2); txt.setAttribute('y', 48);
      txt.setAttribute('class', 'owRSmall'); txt.setAttribute('fill', '#333');
      txt.textContent = mesNum;
      svg.appendChild(txt);
    }
  }
}

function owRedrawReglette() {
  owCreateReglette();
}

function owSetZoom(pct) {
  owCloseMenus();
  owZoomScale = Math.max(0.25, Math.min(4, pct / 100));
  owUpdateZoom();
  // Marquer l'entrée active dans le sous-menu
  document.querySelectorAll('.mnu-subsub li').forEach(li => {
    li.classList.toggle('actif-zoom', parseInt(li.textContent) === pct);
  });
}

function owZoom(event) {
  event.preventDefault();
  owZoomScale += event.deltaY * -0.001;
  owZoomScale = Math.max(0.25, Math.min(4, owZoomScale));
  owUpdateZoom();
  // Effacer la marque active (valeur libre via molette)
  document.querySelectorAll('.mnu-subsub li').forEach(li => li.classList.remove('actif-zoom'));
}

function owUpdateZoom() {
  const scale  = owZoomScale;
  const pct    = Math.round(scale * 100);
  document.getElementById('owZoomVal').textContent = pct;

  owCreateReglette();

  const regle  = document.getElementById('owRegle');
  const work2  = document.getElementById('work2');
  const space  = document.getElementById('space');
  const spaceBkg = document.getElementById('spaceBkg');

  if (scale > 1) {
    const w = Math.round(12960 * scale);
    regle.style.width  = w + 'px';
    work2.style.width  = w + 'px';
    space.style.width  = w + 'px';
    spaceBkg.style.width = w + 'px';
  } else {
    regle.style.width    = '12960px';
    work2.style.width    = '12960px';
    space.style.width    = '12960px';
    spaceBkg.style.width = '12960px';
  }

  space.style.transform    = 'scale(' + scale + ',' + scale + ')';
  space.style.transformOrigin = '0 0';
}

// Écouter le mousewheel sur la réglette
document.getElementById('owReglette').addEventListener('wheel', owZoom, { passive: false });

// ── Compteur de position (mousemove sur réglette + espace) ──
const owWork = document.getElementById('work');

function owMousePosToTime(e) {
  // Position X dans le repère scroll (viewport scroll px)
  const posX = owWork.scrollLeft + e.clientX - 200;
  owSetCompteur(Math.max(0, posX));
}

document.getElementById('owReglette').addEventListener('mousemove', owMousePosToTime);
document.getElementById('owReglette').addEventListener('mouseleave', owResetCompteur);

document.getElementById('space').addEventListener('mousemove', owMousePosToTime);
document.getElementById('space').addEventListener('mouseleave', owResetCompteur);

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
owBuildNuancesTable();
owResetCompteur();
owCreateReglette();
</script>
