function rdDirName(path) {
	const ndir=path.split("/");
	let dir="";
	for(i=0;i<ndir.length-1;i++){
		dir=dir+ndir[i]+"/"
	}
	dir=dir.substring(0, dir.length - 1);
	return dir;
}
function rdBaseName(path) {
	const ndir=path.split("/");
	const baseName=ndir[ndir.length-1]
	return baseName;
}

async function applyFxBuffersMono(obj, currentBuffer, numSamples, sampleRate) {

    console.log("listeFx", obj, obj.tableFx);

    const fxSlots = obj.tableFx || [];
    const validSlots = fxSlots.filter(k => k && listeFx && listeFx[k]);

    const blockSize = 1024;

    // ----- Faust -----
    const faustPkg = await import("./node_modules/@grame/faustwasm/dist/esm/index.js");
    const {
        instantiateFaustModuleFromFile,
        LibFaust,
        FaustCompiler,
        FaustMonoDspGenerator
    } = faustPkg;

    const faustModule = await instantiateFaustModuleFromFile(
        "./node_modules/@grame/faustwasm/libfaust-wasm/libfaust-wasm.js"
    );

    const libFaust = new LibFaust(faustModule);
    const compiler = new FaustCompiler(libFaust);

    let current = new Float32Array(currentBuffer);

    for (let slotIndex = 0; slotIndex < validSlots.length; slotIndex++) {

        const fxKey = validSlots[slotIndex];
        const fxDesc = listeFx[fxKey];
        const dspName = fxDesc.greffon;

        let processor = null;
        let paramsPaths = [];

        try {
            const generator = new FaustMonoDspGenerator();
            let dspSource = await window.api.readFxFile(
                `./greffons/${dspName}-wasm/${dspName}.dsp`
            );

            if (dspSource instanceof Uint8Array || dspSource instanceof ArrayBuffer) {
                dspSource = new TextDecoder().decode(dspSource);
            }

            await generator.compile(compiler, dspName, dspSource, "");
            processor = await generator.createOfflineProcessor(sampleRate, blockSize);

            const paramDest = processor.getParams();
            if (paramDest?.length) {
                paramsPaths = paramDest.map(p => p.path || p);
            }

        } catch (err) {
            console.warn(`[pipeline] DSP failed (${dspName}) → passthrough`, err);
            processor = null;
        }

        // ----- Automation -----
        const tableFxParam = obj.tableFxParam || [];
        const fxParamString = tableFxParam[slotIndex] || "";

        const paramBlocks = fxParamString.split("/").map(blockStr => {
            if (!blockStr) return [];
            return blockStr.split("&").map(seg => {
                const [t, v] = seg.split("?");
                return { time: +t || 0, value: +v || 0 };
            }).sort((a, b) => a.time - b.time);
        });

        // ----- Traitement mono -----
        const out = new Float32Array(numSamples);

        for (let offset = 0; offset < numSamples; offset += blockSize) {

            const len = Math.min(blockSize, numSamples - offset);
            const t0 = offset / sampleRate;

            // Automation
            for (let p = 0; p < paramsPaths.length; p++) {
                const events = paramBlocks[p];
                if (!events?.length) continue;

                let val = events[0].value;

                if (t0 <= events[0].time) val = events[0].value;
                else if (t0 >= events.at(-1).time) val = events.at(-1).value;
                else {
                    for (let i = 0; i < events.length - 1; i++) {
                        const a = events[i], b = events[i + 1];
                        if (t0 >= a.time && t0 < b.time) {
                            const f = (t0 - a.time) / (b.time - a.time);
                            val = a.value + f * (b.value - a.value);
                            break;
                        }
                    }
                }
                try { processor.setParamValue(paramsPaths[p], val); } catch {}
            }

            // Process
            const sliceIn = current.subarray(offset, offset + len);
            let sliceOut = sliceIn;

            if (processor) {
                const rendered = processor.render([sliceIn], len);
                sliceOut = rendered[0];
            }

            out.set(sliceOut, offset);
        }

        current = out;
    }

    // ⬅️ toujours retourner un tableau de canaux
    return [current];
}

function reverseMonoBufferFloat32(srcBuffers) {
    let out = new Array(srcBuffers.length);
     const ch = srcBuffers;
     const rev = new Float32Array(ch.length);

     // copie inversée
     for (let j = 0, k = ch.length - 1; j < ch.length; j++, k--) {
         rev[j] = ch[k];
     }

     out = rev;
    return out;
}
const contextAudio = new AudioContext();
function mixToMono(channels) {
	 if (!channels || channels.length === 0) return null;
    const length = channels[0].length;
    const out = new Float32Array(length);
    if (channels.length >0) {



    for (let i = 0; i < length; i++) {
        let sum = 0;

        for (let c = 0; c < channels.length; c++) {
            sum += channels[c][i];
        }

        out[i] = sum / channels.length; // moyenne → évite clipping
    }
	}else{
		out=channels[0];
	}
    return out;
    
}

async function readOutput(c,mode) {

    const canal = parseInt(c.substring(6)); // canal de sortie
    const tbIn = [];
    let defid;

    const processedChannels = [];

    // --- Identifier toutes les entrées appartenant à ce canal ---
    for (let i = 0; i < tableInOut.length; i++) {  // liste d'association des inputs au canal 
        defid = tableInOut[i].substring(2).split("-");
        if (parseInt(defid[1]) === canal) {
            tbIn.push(parseInt(defid[0]));
        }
    }

    console.log(c, "canal", canal, "tbIn", tbIn);

    // --- Boucle sur toutes les inputs du canal ---
    for (let i = 0; i < tbIn.length; i++) {

        // Récupérer le buffer mono de l'entrée
        let buf = currentChannels[tbIn[i]];

        // Inversion si case cochée
        if (document.getElementById("check" + tbIn[i]).checked === true) {
            buf = await reverseMonoBufferFloat32(buf);
        }

        // --- FX d'entrée (tableObjIn) ---
        const [processedIn] = await applyFxBuffersMono(
            tableObjIn[tbIn[i]],
            buf,
            numSamples,
            sampleRate
        );

        // --- Appliquer le gain du canal d'entrée ---
        const gain = parseFloat(document.getElementById("inpg" + tbIn[i]).value);
        const gained = new Float32Array(numSamples);
        for (let s = 0; s < numSamples; s++) {
            gained[s] = processedIn[s] * gain;
        }
        // Ajouter au tableau pour le mix
        processedChannels.push(gained);
    }
    // --- Mixer toutes les entrées du canal en mono ---
    const mixed = mixToMono(processedChannels);

    // --- FX de sortie du canal ---
    const [processedOut] = await applyFxBuffersMono(
        tableObjOut[canal],
        mixed,
        numSamples,
        sampleRate
    );
    
    let ngain=processedOut;
    let distance=document.getElementById("inps"+outActif).value;
    console.log("distance",outActif,tableObjOut,distance)
   
    const gained2 = new Float32Array(numSamples);
        for (let s = 0; s < numSamples; s++) {
            gained2[s] = ngain[s] * distance;
        }
	 if(mode==0){
	 	// --- Création du buffer pour lecture ---
    	const audioBuffer = contextAudio.createBuffer(1, numSamples, sampleRate);
    	audioBuffer.copyToChannel(gained2, 0);
    	readSimpleOutput(gained2,numSamples,sampleRate);
    	return gained2;
    }else{
    	return gained2;
    }
}
function readSimpleOutput(currentChannel,numSamples,sampleRate) {
	 
	 const audioBuffer = contextAudio.createBuffer(1, numSamples, sampleRate);
    audioBuffer.copyToChannel(currentChannel, 0);

    const source = contextAudio.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(contextAudio.destination);
    source.start();
	
}
