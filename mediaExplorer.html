    async function decodeAudioFromArrayBuffer(arrayBuffer) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      return await ctx.decodeAudioData(arrayBuffer);
    }

    function channelToPath(buffer, channelIndex, width, height) {
      const samples = width; // une colonne par pixel
      const len = buffer.length;
      const step = Math.floor(len / samples);
      const chData = buffer.getChannelData(channelIndex);

      let path = '';
      const midY = height / 2;
      const scale = midY;

      // min/max pour chaque colonne
      for (let i = 0; i < samples; i++) {
        let start = i * step;
        let end = Math.min(len, start + step);
        let min = 1.0, max = -1.0;
        for (let s = start; s < end; s++) {
          const v = chData[s];
          if (v < min) min = v;
          if (v > max) max = v;
        }
        const x = (i / (samples - 1)) * width;
        const y1 = midY - max * scale;
        const y2 = midY - min * scale;
        if (i === 0) {
          path += `M ${x} ${y1}`;
        } else {
          path += ` L ${x} ${y1}`;
        }
      }
      // retour par le bas
      for (let i = samples - 1; i >= 0; i--) {
        let start = i * step;
        let end = Math.min(len, start + step);
        let min = 1.0, max = -1.0;
        for (let s = start; s < end; s++) {
          const v = chData[s];
          if (v < min) min = v;
          if (v > max) max = v;
        }
        const x = (i / (samples - 1)) * width;
        const y2 = midY - min * scale;
        path += ` L ${x} ${y2}`;
      }
      path += ' Z';
      return path;
    }

    function audioBufferToStereoSVG(buffer, opts={}) {
      const width = opts.width || 890;
      const height = opts.height || 100;
      const halfHeight = height / 2;
      const colorL = opts.colorL || "#000000"; // gauche
      const colorR = opts.colorR || "#000000"; // droite

      let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">`;
		svg=svg+'<line id="bvert" stroke="#ff0000" stroke-width="1px" x1="0" y1="0" x2="0" y2="'+bvertY+'" />'
      if (buffer.numberOfChannels > 0) {
        const pathL = channelToPath(buffer, 0, width, halfHeight);
        svg += `<g transform="translate(0,0)"> <path d="${pathL}" fill="${colorL}" fill-opacity="1"/> </g>`;
      }
      if (buffer.numberOfChannels > 1) {
        const pathR = channelToPath(buffer, 1, width, halfHeight);
        // translation verticale pour le canal droit
        svg += `<g transform="translate(0,${halfHeight})"> <path d="${pathR}" fill="${colorR}" fill-opacity="1"/> </g>`;
      }

      svg += "</svg>";
      return svg;
    }

async function readSimpleAudio(duree,filePath,start=0) {
	if(start==0){

}

function suspend() {
	if (playState==1) {
   clearTimeout(timer);
   playState=0;
   window.api.send("toMain", 'killPlay');
  } else {
    playState=1;
    var posX=parseFloat(document.getElementById('bvert').getAttribute("x1"))/800;
    var start=duree*posX
    var gain=parseFloat(document.getElementById("volume").value);
	fooBar();
	window.api.send("toMain", 'playFile;'+filePath+";"+start+";"+gain+";"+defLoop);
  }
}
function fooBar() {
	var rt=800/(duree*20)
	var delay=50;
	console.log("rt",duree,rt)
	var posx=parseFloat(document.getElementById('bvert').getAttribute("x1"))+rt
	document.getElementById('bvert').setAttribute("x1",posx)
	document.getElementById('bvert').setAttribute("x2",posx)
	if(posx>800){
		document.getElementById('bvert').setAttribute("x1",56)
		document.getElementById('bvert').setAttribute("x2",56)
		clearTimeout(timer);
  		playState=0;
	}else{
	timer=setTimeout(fooBar, delay);
	}
}
function setBar(e) {
	if(playState==1){
		clearTimeout(timer);
	}
	
	bvertX=(e.clientX-20)
	var posX=bvertX/800
	var posT=duree*posX

   document.getElementById('bvert').setAttribute("x1",bvertX)
	document.getElementById('bvert').setAttribute("x2",bvertX)
	var gain=parseFloat(document.getElementById("volume").value);
	fooBar();
	window.api.send("toMain", 'playFile;'+filePath+";"+posT+";"+gain+";"+defLoop);
}
