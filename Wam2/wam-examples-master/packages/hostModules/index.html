async function backupPluginStates() {
console.log("savedStates1",window.pluginInstances)
  if (!window.pluginInstances) return [];

  const savedStates = [];

  for (const instance of window.pluginInstances) {
    try {
      if (instance?.audioNode?.getState) {
        const state = await instance.audioNode.getState();
        savedStates.push({
          guiId: instance.guiId,
          wamId: instance.wamId || null, // facultatif si tu veux associer au plugin
          state,
        });
      }
    } catch (err) {
      console.warn(`Échec de la sauvegarde état du plugin gui-${instance.guiId}`, err);
    }
  }
console.log("savedStates1",savedStates)
  return savedStates;
}
async function restorePluginStates(savedStates) {
console.log("savedStates",savedStates)
  if (!window.pluginInstances || !savedStates) return;

  for (const instance of window.pluginInstances) {
    try {
      const saved = savedStates.find(s => s.guiId === instance.guiId);
      if (saved && instance.audioNode?.setState) {
        await instance.audioNode.setState(saved.state);
        console.log(`État restauré pour gui-${instance.guiId}`);
      }
    } catch (err) {
      console.warn(`Impossible de restaurer état pour gui-${instance.guiId}`, err);
    }
  }
}

        async function renderToWavBlob() {
            const audioUrl = document.getElementById("player").src;
            if (!audioUrl) {
                console.error("Aucun fichier audio chargé !");
                return;
            }
            const sampleRate = 48000;
            // Étape 1 : Charger l'audio source en ArrayBuffer
            const response = await fetch(audioUrl);

            const tmpCtx = new AudioContext();
            const decodedBuffer = await tmpCtx.decodeAudioData(arrayBuffer);
            const duration = decodedBuffer.duration;
            // Étape 3 : Créer OfflineAudioContext
            const offlineCtx = new OfflineAudioContext({
                numberOfChannels: 2,
                length: Math.ceil(duration * sampleRate),
                sampleRate: sampleRate,
            });

            const [hostGroupId] = await initializeWamHost(offlineCtx);

				// Étape 5 : Créer une source à partir du buffer décodé
            const bufferSource = offlineCtx.createBufferSource();
            bufferSource.buffer = decodedBuffer;
            // MICHEL BUFFA : on peut utiliser le code suivant, wamURI = l'uri du plugin à charger

		            const { default: WAM } = await import(wamURIs[i]);
		            console.log("wamURIs[0]",wamURIs[i]);
		            // Create a new instance of the plugin, pass groupId
		            const instance2 = await WAM.createInstance(hostGroupId, offlineCtx);
		            pluginInstance2.push(instance2);
		            
		            // pour récupérer les paramètres définis sinon on enregistre l'audio du fichier d'origine
		            if (pluginInstances[i]?.audioNode?.getState) {
		                const state = await pluginInstances[i].audioNode.getState();
		                await pluginInstance2[i].audioNode.setState(state);
		            }
		             if(i<1){
		             	bufferSource.connect(pluginInstance2[0].audioNode);
		             }else{
	   					pluginInstance2[i-1].audioNode.connect(pluginInstance2[i].audioNode);
	            	}
		         }
	         }
	            // Étape 6 : Connecter source → plugin → destination
            if(wamURIs.length==0){
              bufferSource.connect(offlineCtx.destination);
            }else{
           	  pluginInstance2[wamURIs.length-1].audioNode.connect(offlineCtx.destination);
            }
          
            bufferSource.start(0);
            // Étape 7 : Rendu
            console.log("Start rendering...");
            const renderedBuffer = await offlineCtx.startRendering();
            console.log("Rendering done!");
            saveAudioToFile(renderedBuffer);
        }
        function saveAudioToFile(buffer) {
            const wavBlob = convertAudioBufferToBlob(buffer);
            const audioUrl = URL.createObjectURL(wavBlob);
            // Créer un lien de téléchargement
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = audioUrl;
            a.download = 'audio.wav'; // Nom du fichier
            document.body.appendChild(a);
            a.click();
            // Nettoyer
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(audioUrl);
            }, 100);
        }
        function convertAudioBufferToBlob(audioBuffer) {
            var channelData = [],
                totalLength = 0,
                channelLength = 0;
            for (var i = 0; i < audioBuffer.numberOfChannels; i++) {
                channelData.push(audioBuffer.getChannelData(i));
                totalLength += channelData[i].length;
                if (i == 0) channelLength = channelData[i].length;
            }
            // interleaved
            const interleaved = new Float32Array(totalLength);
            for (
                let src = 0, dst = 0;
                src < channelLength;
                src++, dst += audioBuffer.numberOfChannels
            ) {
                for (var j = 0; j < audioBuffer.numberOfChannels; j++) {
                    interleaved[dst + j] = channelData[j][src];
                }
            }
            // get WAV file bytes and audio params of your audio source
            const wavBytes = this.getWavBytes(interleaved.buffer, {
                isFloat: true, // floating point or 16-bit integer
                numChannels: 2,
                sampleRate: 48000,
            });
            const wav = new Blob([wavBytes], { type: "audio/wav" });
            return wav
        }
        function getWavBytes(buffer, options) {
            const type = options.isFloat ? Float32Array : Uint16Array
            const numFrames = buffer.byteLength / type.BYTES_PER_ELEMENT
            const headerBytes = getWavHeader(Object.assign({}, options, { numFrames }))
            const wavBytes = new Uint8Array(headerBytes.length + buffer.byteLength);
            // prepend header, then add pcmBytes
            wavBytes.set(headerBytes, 0)
            wavBytes.set(new Uint8Array(buffer), headerBytes.length)
            return wavBytes
        }
        function getWavHeader(options) {
            const numFrames = options.numFrames
            const numChannels = options.numChannels || 2
            const sampleRate = options.sampleRate || contextAudio.sampleRate
            const bytesPerSample = options.isFloat ? 4 : 2
            const format = options.isFloat ? 3 : 1
            const blockAlign = numChannels * bytesPerSample
            const byteRate = sampleRate * blockAlign
            const dataSize = numFrames * blockAlign
            const buffer = new ArrayBuffer(44)
            const dv = new DataView(buffer)
            let p = 0
            function writeString(s) {
                for (let i = 0; i < s.length; i++) {
                    dv.setUint8(p + i, s.charCodeAt(i))
                }
                p += s.length
            }
            function writeUint32(d) {
                dv.setUint32(p, d, true)
                p += 4
            }
            function writeUint16(d) {
                dv.setUint16(p, d, true)
                p += 2
            }
            writeString('RIFF')              // ChunkID
            writeUint32(dataSize + 36)       // ChunkSize
            writeString('WAVE')              // Format
            writeString('fmt ')              // Subchunk1ID
            writeUint32(16)                  // Subchunk1Size
            writeUint16(format)              // AudioFormat https://i.stack.imgur.com/BuSmb.png
            writeUint16(numChannels)         // NumChannels
            writeUint32(sampleRate)          // SampleRate
            writeUint32(byteRate)            // ByteRate
            writeUint16(blockAlign)          // BlockAlign
            writeUint16(bytesPerSample * 8)  // BitsPerSample
            writeString('data')              // Subchunk2ID
            writeUint32(dataSize)            // Subchunk2Size
            return new Uint8Array(buffer)
        }
