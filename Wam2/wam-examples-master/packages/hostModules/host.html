async function insertWam(i){
	const { default: initializeWamHost } = await import("../sdk/src/initializeWamHost.js");
	const [hostGroupId] = await initializeWamHost(audioContext);
	const { default: pluginFactory } = await import(i);
   const instance = await pluginFactory.createInstance(hostGroupId, audioContext);
   pluginInstances.push(instance);
    audioNodes[pluginInstances.length-1] = pluginInstances[pluginInstances.length-1].audioNode;
   const gui = await instance.createGui();
  
   if(pluginInstances.length==1){
   
   guiMountPoints[0].appendChild(gui);
  
   //sourceNode.disconnect(audioContext.destination);
   sourceNode.connect(audioNodes[0]);
    console.log('selectedIndex => ',guiMountPoints,pluginInstances,audioNodes);
   audioNodes[0].connect(audioContext.destination);
  
   }else{
   guiMountPoints[guiMountPoints.length-1].appendChild(gui);
  
   audioNodes[wamURIs.length-2].disconnect(audioContext.destination);
   audioNodes[wamURIs.length-2].connect(audioNodes[wamURIs.length-1]);
   audioNodes[wamURIs.length-1].connect(audioContext.destination);
   
   }
}		

			
async function cleanupAllPlugins() {
    // Déconnecter les nœuds audio
    if (sourceNode) {
        sourceNode.disconnect();
    }

    // Supprimer les instances de plugin et nettoyer les éléments GUI
    guiMountPoints.forEach((mountPoint, index) => {
        if (mountPoint && mountPoint.firstChild) {
            mountPoint.removeChild(mountPoint.firstChild);
        }
    });
   }
async function backupPluginStates() {
console.log("savedStates1",window.pluginInstances)
  if (!window.pluginInstances) return [];

  const savedStates = [];

  for (const instance of window.pluginInstances) {
    try {
      if (instance?.audioNode?.getState) {
        const state = await instance.audioNode.getState();
        savedStates.push({
          guiId: instance.guiId,
          wamId: instance.wamId || null, // facultatif si tu veux associer au plugin
          state,
        });
      }
    } catch (err) {
      console.warn(`Échec de la sauvegarde état du plugin gui-${instance.guiId}`, err);
    }
  }
console.log("savedStates1",savedStates)
  return savedStates;
}
async function restorePluginStates(savedStates) {
console.log("savedStates",savedStates)
  if (!window.pluginInstances || !savedStates) return;

  for (const instance of window.pluginInstances) {
    try {
      const saved = savedStates.find(s => s.guiId === instance.guiId);
      if (saved && instance.audioNode?.setState) {
        await instance.audioNode.setState(saved.state);
        console.log(`État restauré pour gui-${instance.guiId}`);
      }
    } catch (err) {
      console.warn(`Impossible de restaurer état pour gui-${instance.guiId}`, err);
    }
  }
}

<script type="text/javascript">
		

async function renderToWavBlob() {
   const audioUrl = document.getElementById("player").src;
   if (!audioUrl) {
       console.error("Aucun fichier audio chargé !");
       return;
   }

   // Pas de plugin chargé — renvoyer le signal source tel quel
   if (wamURIs.length === 0) {
       const response = await fetch(audioUrl, { cache: 'no-store' });
       const arrayBuffer = await response.arrayBuffer();
       const tmpCtx = new AudioContext({ sampleRate });
       const decodedBuffer = await tmpCtx.decodeAudioData(arrayBuffer);
       const nwasm = new Float32Array(decodedBuffer.length);
       decodedBuffer.copyFromChannel(nwasm, 0);
       window.api.send("toMain", { type: "rtWasmHost", canal, mode, buffer: nwasm });
       return;
   }

   // Capture en temps réel via ScriptProcessorNode :
   // L'approche OfflineAudioContext + setState() ne fonctionne pas car les messages
   // postMessage() vers l'AudioWorkletProcessor ne sont pas traités avant startRendering().
   // On rembobine le lecteur et on capture la sortie de la chaîne de plugins active.
   const totalSamples = Math.ceil(duration * sampleRate);
   const captured = new Float32Array(totalSamples);
   let capturedSamples = 0;
   let isCapturing = false;
   let done = false;

   const scriptNode = audioContext.createScriptProcessor(4096, 1, 1);
   const lastNode = audioNodes[wamURIs.length - 1];

   try { lastNode.disconnect(audioContext.destination); } catch(e) {}
   lastNode.connect(scriptNode);
   scriptNode.connect(audioContext.destination);

   return new Promise((resolve) => {
       const finish = (buffer) => {
           if (done) return;
           done = true;
           scriptNode.onaudioprocess = null;
           try { scriptNode.disconnect(); } catch(e) {}
           try { lastNode.disconnect(scriptNode); } catch(e) {}
           lastNode.connect(audioContext.destination);
           console.log("Capture terminée :", capturedSamples, "samples");
           window.api.send("toMain", { type: "rtWasmHost", canal, mode, buffer });
           resolve();
       };

       scriptNode.onaudioprocess = (event) => {
           if (!isCapturing || done) return;
           const inputData = event.inputBuffer.getChannelData(0);
           const toCopy = Math.min(inputData.length, totalSamples - capturedSamples);
           captured.set(inputData.subarray(0, toCopy), capturedSamples);
           capturedSamples += toCopy;
           if (capturedSamples >= totalSamples) {
               finish(captured);
           }
       };

       const player = document.getElementById("player");
       player.addEventListener('ended', () => finish(captured.slice(0, capturedSamples)), { once: true });
       player.currentTime = 0;
       player.play()
           .then(() => { isCapturing = true; })
           .catch(err => { console.error("Erreur lecture :", err); finish(captured.slice(0, capturedSamples)); });
   });
}
 

</script>
